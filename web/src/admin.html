<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Panel Admin — Vascan Comensales</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            vascan: {
              bg: '#1A1A2E',
              surface: '#16213E',
              card: '#0F3460',
              gold: '#D4A843',
              goldLight: '#E8C96A',
              goldDark: '#B8902E',
            }
          },
          fontFamily: {
            sans: ['Inter', 'system-ui', 'sans-serif']
          }
        }
      }
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', system-ui, sans-serif; }
    .fade-in { animation: fadeIn 0.3s ease-in; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    select option { background: #16213E; color: white; }
  </style>
</head>
<body class="bg-vascan-bg min-h-screen text-white">
  <div id="root"></div>
  <script type="text/babel" data-type="module">
    const { useState, useEffect, useCallback } = React;

    const API_BASE = window.location.origin;

    async function apiFetch(path, options = {}) {
      const separator = path.includes('?') ? '&' : '?';
      const url = `${API_BASE}${path}${separator}_t=${Date.now()}`;
      const res = await fetch(url, {
        credentials: 'include',
        headers: { 'Content-Type': 'application/json', ...options.headers },
        ...options,
      });
      if (!res.ok) {
        const data = await res.json().catch(() => ({ message: res.statusText }));
        throw new Error(data.message || res.statusText);
      }
      return res.json();
    }

    function Modal({ open, onClose, title, children }) {
      if (!open) return null;
      return (
        <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/60 p-4" onClick={onClose}>
          <div className="bg-vascan-surface border border-white/10 rounded-2xl w-full max-w-lg max-h-[90vh] overflow-y-auto fade-in" onClick={e => e.stopPropagation()}>
            <div className="flex items-center justify-between p-5 border-b border-white/10">
              <h2 className="font-bold text-lg">{title}</h2>
              <button onClick={onClose} className="text-white/40 hover:text-white text-xl leading-none">&times;</button>
            </div>
            <div className="p-5">{children}</div>
          </div>
        </div>
      );
    }

    function ConfirmDialog({ open, onClose, onConfirm, message }) {
      if (!open) return null;
      return (
        <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/60 p-4" onClick={onClose}>
          <div className="bg-vascan-surface border border-white/10 rounded-2xl w-full max-w-sm fade-in" onClick={e => e.stopPropagation()}>
            <div className="p-6 text-center">
              <div className="w-12 h-12 rounded-full bg-red-500/20 flex items-center justify-center mx-auto mb-4">
                <svg className="w-6 h-6 text-red-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-2.5L13.732 4c-.77-.833-1.964-.833-2.732 0L4.082 16.5c-.77.833.192 2.5 1.732 2.5z" /></svg>
              </div>
              <p className="text-white/80 mb-6">{message}</p>
              <div className="flex gap-3 justify-center">
                <button onClick={onClose} className="px-5 py-2.5 rounded-xl bg-white/10 hover:bg-white/15 text-sm font-medium transition">Cancelar</button>
                <button onClick={onConfirm} className="px-5 py-2.5 rounded-xl bg-red-500 hover:bg-red-600 text-sm font-medium transition">Eliminar</button>
              </div>
            </div>
          </div>
        </div>
      );
    }

    function InputField({ label, value, onChange, type = 'text', placeholder = '', required = false }) {
      return (
        <div>
          <label className="block text-sm font-medium text-white/70 mb-1.5">{label}</label>
          <input type={type} value={value} onChange={e => onChange(e.target.value)} placeholder={placeholder} required={required}
            className="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-2.5 text-white placeholder-white/30 focus:outline-none focus:border-vascan-gold/50 focus:ring-1 focus:ring-vascan-gold/30 transition text-sm" />
        </div>
      );
    }

    function SelectField({ label, value, onChange, options }) {
      return (
        <div>
          <label className="block text-sm font-medium text-white/70 mb-1.5">{label}</label>
          <select value={value} onChange={e => onChange(e.target.value)}
            className="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-2.5 text-white focus:outline-none focus:border-vascan-gold/50 transition text-sm" style={{colorScheme: 'dark'}}>
            {options.map(o => <option key={o.value} value={o.value}>{o.label}</option>)}
          </select>
        </div>
      );
    }

    function LoadingSpinner() {
      return <div className="flex justify-center py-12"><div className="w-8 h-8 border-2 border-vascan-gold/30 border-t-vascan-gold rounded-full animate-spin"></div></div>;
    }

    function Toast({ message, type = 'success', onClose }) {
      useEffect(() => { const t = setTimeout(onClose, 3000); return () => clearTimeout(t); }, []);
      const bg = type === 'success' ? 'bg-green-500/15 border-green-500/30 text-green-400' : 'bg-red-500/15 border-red-500/30 text-red-400';
      return (
        <div className={`fixed top-4 right-4 z-[60] px-5 py-3 rounded-xl border text-sm font-medium fade-in ${bg}`}>
          {message}
        </div>
      );
    }

    function formatRutInput(value) {
      let cleaned = value.replace(/[^0-9kK]/g, '').toUpperCase();
      if (cleaned.length > 9) cleaned = cleaned.slice(0, 9);
      if (cleaned.length <= 1) return cleaned;
      const body = cleaned.slice(0, -1);
      const dv = cleaned.slice(-1);
      let formatted = '';
      const reversed = body.split('').reverse();
      for (let i = 0; i < reversed.length; i++) {
        if (i > 0 && i % 3 === 0) formatted = '.' + formatted;
        formatted = reversed[i] + formatted;
      }
      return formatted + '-' + dv;
    }

    function cleanRut(formattedRut) {
      return formattedRut.replace(/\./g, '');
    }

    function validarRutChileno(rutCompleto) {
      const cleaned = rutCompleto.replace(/\./g, '').replace(/-/g, '').trim().toUpperCase();
      if (cleaned.length < 2) return false;
      const cuerpo = cleaned.slice(0, -1);
      const dvIngresado = cleaned.slice(-1);
      if (!/^\d+$/.test(cuerpo)) return false;
      let suma = 0;
      let multiplicador = 2;
      for (let i = cuerpo.length - 1; i >= 0; i--) {
        suma += parseInt(cuerpo[i]) * multiplicador;
        multiplicador = multiplicador === 7 ? 2 : multiplicador + 1;
      }
      const resto = suma % 11;
      const dvCalculado = resto === 0 ? '0' : resto === 1 ? 'K' : String(11 - resto);
      return dvIngresado === dvCalculado;
    }

    function looksLikeRut(val) {
      return /\d/.test(val) && /^[\d.\-kK]+$/.test(val.trim());
    }

    // ── Login Screen ──
    function LoginScreen({ onLogin }) {
      const [identifier, setIdentifier] = useState('');
      const [password, setPassword] = useState('');
      const [error, setError] = useState('');
      const [loading, setLoading] = useState(false);

      function looksLikeRut(val) {
        return /\d/.test(val) && /^[\d.\-kK]+$/.test(val.trim());
      }

      function handleIdentifierChange(val) {
        if (looksLikeRut(val)) {
          setIdentifier(formatRutInput(val));
        } else {
          setIdentifier(val);
        }
      }

      async function handleSubmit(e) {
        e.preventDefault();
        setError('');
        setLoading(true);
        try {
          const loginValue = looksLikeRut(identifier) ? cleanRut(identifier) : identifier.trim();
          const data = await apiFetch('/api/auth/login', { method: 'POST', body: JSON.stringify({ rut: loginValue, password }) });
          if (data.user.role !== 'admin') { setError('Acceso restringido a administradores'); return; }
          onLogin(data.user);
        } catch (err) {
          setError('Usuario o contraseña incorrectos');
        } finally {
          setLoading(false);
        }
      }

      return (
        <div className="min-h-screen flex items-center justify-center p-4">
          <div className="w-full max-w-md">
            <div className="text-center mb-8">
              <div className="w-16 h-16 bg-vascan-gold/20 rounded-2xl flex items-center justify-center mx-auto mb-4">
                <svg className="w-8 h-8 text-vascan-gold" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 6V4m0 2a2 2 0 100 4m0-4a2 2 0 110 4m-6 8a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4m6 6v10m6-2a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4" />
                </svg>
              </div>
              <h1 className="text-2xl font-bold text-white">Panel de Administración</h1>
              <p className="text-white/50 mt-1">Vascan SPA — Sistema de Comensales</p>
            </div>
            <form onSubmit={handleSubmit} className="bg-vascan-surface rounded-2xl p-6 space-y-5 border border-white/10">
              {error && <div className="bg-red-500/15 border border-red-500/30 rounded-xl px-4 py-3 text-red-400 text-sm">{error}</div>}
              <InputField label="Usuario o RUT" value={identifier} onChange={handleIdentifierChange} placeholder="usuario o 11.111.111-1" required />
              <InputField label="Contraseña" value={password} onChange={setPassword} type="password" placeholder="••••••" required />
              <button type="submit" disabled={loading} className="w-full bg-vascan-gold hover:bg-vascan-goldDark text-white font-semibold py-3 rounded-xl transition disabled:opacity-50">
                {loading ? 'Ingresando...' : 'Iniciar Sesión'}
              </button>
            </form>
          </div>
        </div>
      );
    }

    // ── Sidebar ──
    function Sidebar({ active, onNav, onLogout, user }) {
      const items = [
        { id: 'dashboard', label: 'Dashboard', icon: 'M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6' },
        { id: 'usuarios', label: 'Usuarios', icon: 'M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z' },
        { id: 'casinos', label: 'Casinos', icon: 'M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4' },
        { id: 'minutas', label: 'Minutas', icon: 'M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01' },
        { id: 'consolidacion', label: 'Consolidación', icon: 'M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z' },
        { id: 'familias', label: 'Familias', icon: 'M7 7h.01M7 3h5c.512 0 1.024.195 1.414.586l7 7a2 2 0 010 2.828l-7 7a2 2 0 01-2.828 0l-7-7A1.994 1.994 0 013 12V7a4 4 0 014-4z' },
        { id: 'periodos', label: 'Periodos', icon: 'M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z' },
        { id: 'carga', label: 'Carga Masiva', icon: 'M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12' },
      ];

      return (
        <div className="w-64 bg-vascan-surface border-r border-white/10 flex flex-col min-h-screen">
          <div className="p-5 border-b border-white/10">
            <h2 className="font-bold text-lg text-vascan-gold">Vascan Admin</h2>
            <p className="text-xs text-white/40 mt-0.5">{user?.nombre} {user?.apellido}</p>
          </div>
          <nav className="flex-1 p-3 space-y-1">
            {items.map(item => (
              <button key={item.id} onClick={() => onNav(item.id)}
                className={`w-full text-left px-4 py-2.5 rounded-xl text-sm font-medium transition flex items-center gap-3 ${active === item.id ? 'bg-vascan-gold/15 text-vascan-gold' : 'text-white/60 hover:bg-white/5 hover:text-white/80'}`}>
                <svg className="w-5 h-5 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={1.5} d={item.icon} /></svg>
                {item.label}
              </button>
            ))}
          </nav>
          <div className="p-3 border-t border-white/10">
            <button onClick={onLogout} className="w-full text-left px-4 py-2.5 rounded-xl text-sm text-red-400 hover:bg-red-500/10 transition flex items-center gap-3">
              <svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={1.5} d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" /></svg>
              Cerrar sesión
            </button>
          </div>
        </div>
      );
    }

    // ── Dashboard ──
    function DashboardView() {
      const [stats, setStats] = useState(null);
      const [pedidoStats, setPedidoStats] = useState(null);
      const [loading, setLoading] = useState(true);

      useEffect(() => {
        Promise.all([
          apiFetch('/api/casinos'),
          apiFetch('/api/usuarios'),
          apiFetch('/api/minutas'),
          apiFetch('/api/reportes/dashboard').catch(() => null),
        ])
          .then(([c, u, m, ps]) => {
            setStats({ casinos: c.length, usuarios: u.length, minutas: m.length });
            if (ps) setPedidoStats(ps);
          })
          .catch(console.error)
          .finally(() => setLoading(false));
      }, []);

      if (loading) return <LoadingSpinner />;

      return (
        <div className="fade-in">
          <h1 className="text-2xl font-bold mb-6">Dashboard</h1>
          <div className="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
            <StatCard title="Usuarios" value={stats?.usuarios || 0} icon="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z" />
            <StatCard title="Casinos" value={stats?.casinos || 0} icon="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4" />
            <StatCard title="Minutas" value={stats?.minutas || 0} icon="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2" />
          </div>
          {pedidoStats && (
            <>
              <h2 className="text-lg font-semibold mb-3 text-white/80">Inscripciones</h2>
              <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                <StatCard title="Inscripciones" value={pedidoStats.totalInscripciones} icon="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" color="text-green-400" bgColor="bg-green-500/15" />
                <StatCard title="No Asisten" value={pedidoStats.totalNoAsiste} icon="M10 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2m7-2a9 9 0 11-18 0 9 9 0 0118 0z" color="text-orange-400" bgColor="bg-orange-500/15" />
                <StatCard title="Vales de Visita" value={pedidoStats.totalVisitas} icon="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z" color="text-blue-400" bgColor="bg-blue-500/15" />
              </div>
            </>
          )}
        </div>
      );
    }

    function StatCard({ title, value, icon, color, bgColor }) {
      return (
        <div className="bg-vascan-surface rounded-2xl border border-white/10 p-5">
          <div className="flex items-center gap-3 mb-2">
            <div className={`w-10 h-10 rounded-xl ${bgColor || 'bg-vascan-gold/15'} flex items-center justify-center`}>
              <svg className={`w-5 h-5 ${color || 'text-vascan-gold'}`} fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={1.5} d={icon} /></svg>
            </div>
          </div>
          <p className="text-2xl font-bold">{value}</p>
          <p className="text-white/50 text-sm mt-0.5">{title}</p>
        </div>
      );
    }

    // ── Usuarios CRUD ──
    function UsuariosView() {
      const [users, setUsers] = useState([]);
      const [casinos, setCasinos] = useState([]);
      const [loading, setLoading] = useState(true);
      const [showModal, setShowModal] = useState(false);
      const [editUser, setEditUser] = useState(null);
      const [deleteTarget, setDeleteTarget] = useState(null);
      const [toast, setToast] = useState(null);
      const [search, setSearch] = useState('');

      const [form, setForm] = useState({ rut: '', nombre: '', apellido: '', role: 'comensal', casinoId: '', password: '' });

      useEffect(() => { loadData(); }, []);

      async function loadData() {
        setLoading(true);
        try {
          const [u, c] = await Promise.all([apiFetch('/api/usuarios'), apiFetch('/api/casinos')]);
          setUsers(u);
          setCasinos(c);
        } catch (e) { console.error(e); }
        setLoading(false);
      }

      function openCreate() {
        setEditUser(null);
        setForm({ rut: '', nombre: '', apellido: '', role: 'comensal', casinoId: '', password: '' });
        setShowModal(true);
      }

      function openEdit(u) {
        setEditUser(u);
        setForm({ rut: u.rut, nombre: u.nombre, apellido: u.apellido, role: u.role, casinoId: u.casinoId || '', password: '' });
        setShowModal(true);
      }

      async function handleSave(e) {
        e.preventDefault();
        try {
          if (editUser) {
            const body = { nombre: form.nombre, apellido: form.apellido, role: form.role, casinoId: form.casinoId || null };
            if (form.password) body.password = form.password;
            await apiFetch(`/api/usuarios/${editUser.id}`, { method: 'PUT', body: JSON.stringify(body) });
            setToast({ message: 'Usuario actualizado', type: 'success' });
          } else {
            const rutLimpio = cleanRut(form.rut);
            if (looksLikeRut(rutLimpio) && !validarRutChileno(rutLimpio)) {
              setToast({ message: 'El RUT ingresado no es válido. Verifique el dígito verificador.', type: 'error' });
              return;
            }
            await apiFetch('/api/usuarios', { method: 'POST', body: JSON.stringify({...form, rut: rutLimpio}) });
            setToast({ message: 'Usuario creado', type: 'success' });
          }
          setShowModal(false);
          loadData();
        } catch (err) {
          setToast({ message: err.message, type: 'error' });
        }
      }

      async function handleDelete() {
        try {
          await apiFetch(`/api/usuarios/${deleteTarget.id}`, { method: 'DELETE' });
          setToast({ message: 'Usuario eliminado', type: 'success' });
          setDeleteTarget(null);
          loadData();
        } catch (err) {
          setToast({ message: err.message, type: 'error' });
        }
      }

      async function toggleActive(u) {
        try {
          await apiFetch(`/api/usuarios/${u.id}`, { method: 'PUT', body: JSON.stringify({ activo: !u.activo }) });
          loadData();
        } catch (err) {
          setToast({ message: err.message, type: 'error' });
        }
      }

      const filtered = users.filter(u =>
        u.nombre.toLowerCase().includes(search.toLowerCase()) ||
        u.apellido.toLowerCase().includes(search.toLowerCase()) ||
        u.rut.toLowerCase().includes(search.toLowerCase())
      );

      const roleLabels = { admin: 'Admin', comensal: 'Comensal', interlocutor: 'Interlocutor' };
      const roleBadge = { admin: 'bg-purple-500/20 text-purple-400', comensal: 'bg-blue-500/20 text-blue-400', interlocutor: 'bg-vascan-gold/20 text-vascan-gold' };

      if (loading) return <LoadingSpinner />;

      return (
        <div className="fade-in">
          {toast && <Toast message={toast.message} type={toast.type} onClose={() => setToast(null)} />}

          <div className="flex items-center justify-between mb-6">
            <h1 className="text-2xl font-bold">Usuarios</h1>
            <button onClick={openCreate} className="bg-vascan-gold hover:bg-vascan-goldDark text-white font-semibold px-5 py-2.5 rounded-xl transition text-sm flex items-center gap-2">
              <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 4v16m8-8H4" /></svg>
              Nuevo Usuario
            </button>
          </div>

          <div className="bg-vascan-surface rounded-2xl border border-white/10 overflow-hidden">
            <div className="p-4 border-b border-white/10">
              <input type="text" value={search} onChange={e => setSearch(e.target.value)} placeholder="Buscar por nombre, apellido o RUT..."
                className="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-2.5 text-white placeholder-white/30 focus:outline-none focus:border-vascan-gold/50 transition text-sm" />
            </div>
            <div className="overflow-x-auto">
              <table className="w-full text-sm">
                <thead>
                  <tr className="border-b border-white/10 text-white/50">

    // ── Casinos CRUD ──
    function CasinosView() {
      const [casinosList, setCasinosList] = useState([]);
      const [loading, setLoading] = useState(true);
      const [showModal, setShowModal] = useState(false);
      const [editItem, setEditItem] = useState(null);
      const [deleteTarget, setDeleteTarget] = useState(null);
      const [toast, setToast] = useState(null);
      const [form, setForm] = useState({ nombre: '', direccion: '' });

      useEffect(() => { loadData(); }, []);

      async function loadData() {
        setLoading(true);
        try {
          const data = await apiFetch('/api/casinos/all');
          setCasinosList(data);
        } catch (e) { console.error(e); }
        setLoading(false);
      }

      function openCreate() {
        setEditItem(null);
        setForm({ nombre: '', direccion: '' });
        setShowModal(true);
      }

      function openEdit(c) {
        setEditItem(c);
        setForm({ nombre: c.nombre, direccion: c.direccion || '' });
        setShowModal(true);
      }

      async function handleSave(e) {
        e.preventDefault();
        try {
          if (editItem) {
            await apiFetch(`/api/casinos/${editItem.id}`, { method: 'PUT', body: JSON.stringify(form) });
            setToast({ message: 'Casino actualizado', type: 'success' });
          } else {
            await apiFetch('/api/casinos', { method: 'POST', body: JSON.stringify(form) });
            setToast({ message: 'Casino creado', type: 'success' });
          }
          setShowModal(false);
          loadData();
        } catch (err) {
          setToast({ message: err.message, type: 'error' });
        }
      }

      async function handleDelete() {
        try {
          await apiFetch(`/api/casinos/${deleteTarget.id}`, { method: 'DELETE' });
          setToast({ message: 'Casino desactivado', type: 'success' });
          setDeleteTarget(null);
          loadData();
        } catch (err) {
          setToast({ message: err.message, type: 'error' });
        }
      }

      async function toggleActive(c) {
        try {
          await apiFetch(`/api/casinos/${c.id}`, { method: 'PUT', body: JSON.stringify({ activo: !c.activo }) });
          loadData();
        } catch (err) {
          setToast({ message: err.message, type: 'error' });
        }
      }

      if (loading) return <LoadingSpinner />;

      return (
        <div className="fade-in">
          {toast && <Toast message={toast.message} type={toast.type} onClose={() => setToast(null)} />}

          <div className="flex items-center justify-between mb-6">
            <h1 className="text-2xl font-bold">Casinos</h1>
            <button onClick={openCreate} className="bg-vascan-gold hover:bg-vascan-goldDark text-white font-semibold px-5 py-2.5 rounded-xl transition text-sm flex items-center gap-2">
              <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 4v16m8-8H4" /></svg>
              Nuevo Casino
            </button>
          </div>

          <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
            {casinosList.map(c => (
              <div key={c.id} className={`bg-vascan-surface rounded-2xl border p-5 ${c.activo ? 'border-white/10' : 'border-red-500/20 opacity-60'}`}>
                <div className="flex items-start justify-between mb-3">
                  <div>
                    <h3 className="font-semibold text-lg">{c.nombre}</h3>
                    <p className="text-white/40 text-sm mt-0.5">{c.direccion || 'Sin dirección'}</p>
                  </div>
                  <div className="flex items-center gap-2">
                    <button onClick={() => toggleActive(c)} className={`px-2.5 py-1 rounded-full text-xs font-medium ${c.activo ? 'bg-green-500/20 text-green-400' : 'bg-red-500/20 text-red-400'}`}>
                      {c.activo ? 'Activo' : 'Inactivo'}
                    </button>
                  </div>
                </div>
                <div className="flex items-center gap-2 mt-3 pt-3 border-t border-white/5">
                  <button onClick={() => openEdit(c)} className="text-xs text-white/50 hover:text-vascan-gold transition flex items-center gap-1">
                    <svg className="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" /></svg>
                    Editar
                  </button>
                  <button onClick={() => setDeleteTarget(c)} className="text-xs text-white/50 hover:text-red-400 transition flex items-center gap-1">
                    <svg className="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>
                    Desactivar
                  </button>
                </div>
                <p className="text-[10px] text-white/20 mt-2 font-mono">{c.id}</p>
              </div>
            ))}
          </div>

          <Modal open={showModal} onClose={() => setShowModal(false)} title={editItem ? 'Editar Casino' : 'Nuevo Casino'}>
            <form onSubmit={handleSave} className="space-y-4">
              <InputField label="Nombre" value={form.nombre} onChange={v => setForm({...form, nombre: v})} placeholder="Casino Central" required />
              <InputField label="Dirección" value={form.direccion} onChange={v => setForm({...form, direccion: v})} placeholder="Av. Principal 123" />
              <div className="flex justify-end gap-3 pt-2">
                <button type="button" onClick={() => setShowModal(false)} className="px-5 py-2.5 rounded-xl bg-white/10 hover:bg-white/15 text-sm font-medium transition">Cancelar</button>
                <button type="submit" className="px-5 py-2.5 rounded-xl bg-vascan-gold hover:bg-vascan-goldDark text-sm font-medium transition">
                  {editItem ? 'Guardar Cambios' : 'Crear Casino'}
                </button>
              </div>
            </form>
          </Modal>

          <ConfirmDialog open={!!deleteTarget} onClose={() => setDeleteTarget(null)} onConfirm={handleDelete}
            message={`¿Desactivar el casino "${deleteTarget?.nombre}"?`} />
        </div>
      );
    }

    // ── Minutas CRUD ──
    function hexToFamiliaBadge(hex) {
      return `border-[${hex}50] text-[${hex}] bg-[${hex}15]`;
    }
    function getFamiliaLabel(val, familiasList) {
      if (!familiasList) return val;
      const found = familiasList.find(f => f.nombre.toLowerCase() === val?.toLowerCase() || f.nombre === val);
      return found ? found.nombre : val || 'N/A';
    }
    function getFamiliaColor(val, familiasList) {
      if (!familiasList) return 'bg-white/10 text-white/60 border-white/20';
      const found = familiasList.find(f => f.nombre.toLowerCase() === val?.toLowerCase() || f.nombre === val);
      if (!found) return 'bg-white/10 text-white/60 border-white/20';
      const presets = {
        'Almuerzo': 'bg-amber-500/20 text-amber-300 border-amber-500/30',
        'Desayuno': 'bg-sky-500/20 text-sky-300 border-sky-500/30',
        'Colación': 'bg-green-500/20 text-green-300 border-green-500/30',
        'Almuerzo Fin de Semana': 'bg-purple-500/20 text-purple-300 border-purple-500/30',
        'Cena': 'bg-indigo-500/20 text-indigo-300 border-indigo-500/30',
        'Once': 'bg-rose-500/20 text-rose-300 border-rose-500/30',
      };
      return presets[found.nombre] || 'bg-white/10 text-white/60 border-white/20';
    }

    function MinutasView() {
      const [casinos, setCasinos] = useState([]);
      const [selectedCasino, setSelectedCasino] = useState('');
      const [filterFamilia, setFilterFamilia] = useState('');
      const [familiasList, setFamiliasList] = useState([]);
      const [minutasList, setMinutasList] = useState([]);
      const [loading, setLoading] = useState(true);
      const [showModal, setShowModal] = useState(false);
      const [showCloneModal, setShowCloneModal] = useState(false);
      const [cloneSource, setCloneSource] = useState(null);
      const [cloneForm, setCloneForm] = useState({ fecha: '', casinoIds: [] });
      const [editItem, setEditItem] = useState(null);
      const [deleteTarget, setDeleteTarget] = useState(null);
      const [toast, setToast] = useState(null);
      const [form, setForm] = useState({ fecha: '', familia: 'almuerzo', opcion1: '', opcion2: '', opcion3: '', opcion4: '', opcion5: '', casinoIds: [] });

      useEffect(() => {
        Promise.all([apiFetch('/api/casinos'), apiFetch('/api/familias')]).then(([casinoData, famData]) => {
          setCasinos(casinoData);
          setFamiliasList(famData.filter(f => f.activo));
          if (casinoData.length > 0) { setSelectedCasino(casinoData[0].id); loadMinutas(casinoData[0].id); }
          else setLoading(false);
        });
      }, []);

      async function loadMinutas(casinoId) {
        setLoading(true);
        try {
          const data = await apiFetch(`/api/minutas/${casinoId}?all=true`);
          setMinutasList(data.sort((a, b) => a.fecha.localeCompare(b.fecha)));
        } catch (e) { console.error(e); }
        setLoading(false);
      }

      function handleCasinoChange(id) {
        setSelectedCasino(id);
        loadMinutas(id);
      }

      function openCreate() {
        setEditItem(null);
        const defaultFamilia = familiasList.length > 0 ? familiasList[0].nombre : 'Almuerzo';
        setForm({ fecha: new Date().toISOString().split('T')[0], familia: defaultFamilia, opcion1: '', opcion2: '', opcion3: '', opcion4: '', opcion5: '', casinoIds: [selectedCasino] });
        setShowModal(true);
      }

      function openEdit(m) {
        setEditItem(m);
        setForm({ fecha: m.fecha, familia: m.familia || 'Almuerzo', opcion1: m.opcion1, opcion2: m.opcion2, opcion3: m.opcion3, opcion4: m.opcion4 || '', opcion5: m.opcion5 || '', casinoIds: [m.casinoId] });
        setShowModal(true);
      }

      function openClone(m) {
        setCloneSource(m);
        setCloneForm({ fecha: '', casinoIds: [m.casinoId] });
        setShowCloneModal(true);
      }

      function toggleCasinoInList(list, id) {
        return list.includes(id) ? list.filter(x => x !== id) : [...list, id];
      }

      async function handleSave(e) {
        e.preventDefault();
        try {
          if (editItem) {
            const body = { ...form, casinoId: editItem.casinoId, opcion4: form.opcion4 || null, opcion5: form.opcion5 || null };
            delete body.casinoIds;
            await apiFetch(`/api/minutas/${editItem.id}`, { method: 'PUT', body: JSON.stringify(body) });
            setToast({ message: 'Minuta actualizada', type: 'success' });
          } else {
            if (form.casinoIds.length === 0) {
              setToast({ message: 'Seleccione al menos un casino', type: 'error' });
              return;
            }
            const body = { ...form, opcion4: form.opcion4 || null, opcion5: form.opcion5 || null };
            await apiFetch('/api/minutas', { method: 'POST', body: JSON.stringify(body) });
            setToast({ message: `Minuta creada en ${form.casinoIds.length} casino(s)`, type: 'success' });
          }
          setShowModal(false);
          loadMinutas(selectedCasino);
        } catch (err) {
          setToast({ message: err.message, type: 'error' });
        }
      }

      async function handleClone(e) {
        e.preventDefault();
        if (!cloneSource) return;
        if (cloneForm.casinoIds.length === 0) {
          setToast({ message: 'Seleccione al menos un casino destino', type: 'error' });
          return;
        }
        try {
          const body = { fecha: cloneForm.fecha || null, casinoIds: cloneForm.casinoIds };
          await apiFetch(`/api/minutas/${cloneSource.id}/clonar`, { method: 'POST', body: JSON.stringify(body) });
          setToast({ message: `Minuta clonada en ${cloneForm.casinoIds.length} casino(s)`, type: 'success' });
          setShowCloneModal(false);
          loadMinutas(selectedCasino);
        } catch (err) {
          setToast({ message: err.message, type: 'error' });
        }
      }

      async function handleDelete() {
        try {
          await apiFetch(`/api/minutas/${deleteTarget.id}`, { method: 'DELETE' });
          setToast({ message: 'Minuta desactivada', type: 'success' });
          setDeleteTarget(null);
          loadMinutas(selectedCasino);
        } catch (err) {
          setToast({ message: err.message, type: 'error' });
        }
      }

      async function toggleMinutaActivo(m) {
        try {
          await apiFetch(`/api/minutas/${m.id}`, { method: 'PUT', body: JSON.stringify({ activo: !m.activo }) });
          setToast({ message: m.activo ? 'Minuta desactivada' : 'Minuta activada', type: 'success' });
          loadMinutas(selectedCasino);
        } catch (err) {
          setToast({ message: err.message, type: 'error' });
        }
      }

      async function batchToggleWeek(weekMinutas, newActivo) {
        try {
          const ids = weekMinutas.map(m => m.id);
          await apiFetch('/api/minutas/batch-toggle', { method: 'POST', body: JSON.stringify({ ids, activo: newActivo }) });
          setToast({ message: `${ids.length} minutas ${newActivo ? 'activadas' : 'desactivadas'}`, type: 'success' });
          loadMinutas(selectedCasino);
        } catch (err) {
          setToast({ message: err.message, type: 'error' });
        }
      }

      function getWeekKey(dateStr) {
        const d = new Date(dateStr + 'T12:00:00');
        const jan1 = new Date(d.getFullYear(), 0, 1);
        const days = Math.floor((d - jan1) / 86400000);
        const weekNum = Math.ceil((days + jan1.getDay() + 1) / 7);
        return `${d.getFullYear()}-W${String(weekNum).padStart(2, '0')}`;
      }

      function getWeekRange(minutas) {
        const dates = minutas.map(m => m.fecha).sort();
        const first = new Date(dates[0] + 'T12:00:00');
        const last = new Date(dates[dates.length - 1] + 'T12:00:00');
        const fmt = d => d.toLocaleDateString('es-CL', { day: '2-digit', month: 'short' });
        return `${fmt(first)} — ${fmt(last)}`;
      }

      function groupByWeek(minutas) {
        const groups = {};
        minutas.forEach(m => {
          const key = getWeekKey(m.fecha);
          if (!groups[key]) groups[key] = [];
          groups[key].push(m);
        });
        return Object.entries(groups).sort((a, b) => a[0].localeCompare(b[0]));
      }

      const DAYS = ['Dom', 'Lun', 'Mar', 'Mié', 'Jue', 'Vie', 'Sáb'];
      const filtered = filterFamilia ? minutasList.filter(m => (m.familia || '').toLowerCase() === filterFamilia.toLowerCase()) : minutasList;
      const weekGroups = groupByWeek(filtered);

      if (loading && casinos.length === 0) return <LoadingSpinner />;

      return (
        <div className="fade-in">
          {toast && <Toast message={toast.message} type={toast.type} onClose={() => setToast(null)} />}

          <div className="flex items-center justify-between mb-6">
            <h1 className="text-2xl font-bold">Minutas</h1>
            <button onClick={openCreate} className="bg-vascan-gold hover:bg-vascan-goldDark text-white font-semibold px-5 py-2.5 rounded-xl transition text-sm flex items-center gap-2">
              <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 4v16m8-8H4" /></svg>
              Nueva Minuta
            </button>
          </div>

          <div className="bg-vascan-surface rounded-2xl border border-white/10 p-4 mb-6">
            <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
              <select value={selectedCasino} onChange={e => handleCasinoChange(e.target.value)}
                className="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-2.5 text-white focus:outline-none focus:border-vascan-gold/50 transition text-sm" style={{colorScheme: 'dark'}}>
                {casinos.map(c => <option key={c.id} value={c.id}>{c.nombre}</option>)}
              </select>
              <select value={filterFamilia} onChange={e => setFilterFamilia(e.target.value)}
                className="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-2.5 text-white focus:outline-none focus:border-vascan-gold/50 transition text-sm" style={{colorScheme: 'dark'}}>
                <option value="">Todas las familias</option>
                {familiasList.map(f => <option key={f.id} value={f.nombre}>{f.nombre}</option>)}
              </select>
            </div>
          </div>

          {loading ? <LoadingSpinner /> : weekGroups.length === 0 ? (
            <div className="text-center py-12 text-white/40">No hay minutas para este filtro</div>
          ) : (
            <div className="space-y-6">
              {weekGroups.map(([weekKey, weekMinutas]) => {
                const allActive = weekMinutas.every(m => m.activo);
                const someActive = weekMinutas.some(m => m.activo);
                return (
                  <div key={weekKey} className={`bg-vascan-surface rounded-2xl border ${allActive ? 'border-green-500/30' : someActive ? 'border-yellow-500/20' : 'border-white/10'} overflow-hidden`}>
                    <div className="flex items-center justify-between px-5 py-3 border-b border-white/10 bg-white/[0.02]">
                      <div className="flex items-center gap-3">
                        <div>
                          <p className="text-sm font-semibold text-white">{getWeekRange(weekMinutas)}</p>
                          <p className="text-xs text-white/40">{weekMinutas.length} minutas</p>
                        </div>
                        {allActive && <span className="px-2 py-0.5 bg-green-500/20 text-green-400 text-xs font-medium rounded-full">ACTIVA</span>}
                        {!allActive && someActive && <span className="px-2 py-0.5 bg-yellow-500/20 text-yellow-400 text-xs font-medium rounded-full">PARCIAL</span>}
                        {!someActive && <span className="px-2 py-0.5 bg-white/10 text-white/40 text-xs font-medium rounded-full">INACTIVA</span>}
                      </div>
                      <div className="flex items-center gap-2">
                        {!allActive && (

                                <p className="text-vascan-gold font-semibold">{DAYS[d.getDay()]} {d.getDate()}</p>

                                  }
                                </button>
                                <button onClick={() => openClone(m)} title="Clonar" className="p-1.5 rounded-lg hover:bg-white/10 text-white/40 hover:text-green-400 transition">
                                  <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z" /></svg>

                                </button>
                              </div>
                            </div>
                            <div className="space-y-1.5 text-sm">
                              <div className="flex gap-2"><span className="text-vascan-gold font-semibold min-w-[20px]">1.</span><span className="text-white/70">{m.opcion1}</span></div>
                              <div className="flex gap-2"><span className="text-vascan-gold font-semibold min-w-[20px]">2.</span><span className="text-white/70">{m.opcion2}</span></div>
                              <div className="flex gap-2"><span className="text-vascan-gold font-semibold min-w-[20px]">3.</span><span className="text-white/70">{m.opcion3}</span></div>

                            </div>
                          </div>
                        );
                      })}
                    </div>
                  </div>
                );
              })}
            </div>
          )}

          <Modal open={showModal} onClose={() => setShowModal(false)} title={editItem ? 'Editar Minuta' : 'Nueva Minuta'}>

              <InputField label="Fecha" value={form.fecha} onChange={v => setForm({...form, fecha: v})} type="date" required />
              <div>

                <select value={form.familia} onChange={e => setForm({...form, familia: e.target.value})}

                  {familiasList.map(f => <option key={f.id} value={f.nombre}>{f.nombre}</option>)}

              </div>
              {!editItem && (
                <div>
                  <label className="block text-sm font-medium text-white/60 mb-1.5">Casinos (seleccione uno o más)</label>
