<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Panel Admin — Vascan Comensales</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            vascan: {
              bg: '#1A1A2E',
              surface: '#16213E',
              card: '#0F3460',
              gold: '#D4A843',
              goldLight: '#E8C96A',
              goldDark: '#B8902E',
            }
          },
          fontFamily: {
            sans: ['Inter', 'system-ui', 'sans-serif']
          }
        }
      }
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', system-ui, sans-serif; }
    .fade-in { animation: fadeIn 0.3s ease-in; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    select option { background: #16213E; color: white; }
  </style>
</head>
<body class="bg-vascan-bg min-h-screen text-white">
  <div id="root"></div>
  <script type="text/babel" data-type="module">
    const { useState, useEffect, useCallback } = React;

    const API_BASE = window.location.origin;

    async function apiFetch(path, options = {}) {
      const res = await fetch(`${API_BASE}${path}`, {
        credentials: 'include',
        headers: { 'Content-Type': 'application/json', ...options.headers },
        ...options,
      });
      if (!res.ok) {
        const data = await res.json().catch(() => ({ message: res.statusText }));
        throw new Error(data.message || res.statusText);
      }
      return res.json();
    }

    function Modal({ open, onClose, title, children }) {
      if (!open) return null;
      return (
        <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/60 p-4" onClick={onClose}>
          <div className="bg-vascan-surface border border-white/10 rounded-2xl w-full max-w-lg max-h-[90vh] overflow-y-auto fade-in" onClick={e => e.stopPropagation()}>
            <div className="flex items-center justify-between p-5 border-b border-white/10">
              <h2 className="font-bold text-lg">{title}</h2>
              <button onClick={onClose} className="text-white/40 hover:text-white text-xl leading-none">&times;</button>
            </div>
            <div className="p-5">{children}</div>
          </div>
        </div>
      );
    }

    function ConfirmDialog({ open, onClose, onConfirm, message }) {
      if (!open) return null;
      return (
        <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/60 p-4" onClick={onClose}>
          <div className="bg-vascan-surface border border-white/10 rounded-2xl w-full max-w-sm fade-in" onClick={e => e.stopPropagation()}>
            <div className="p-6 text-center">
              <div className="w-12 h-12 rounded-full bg-red-500/20 flex items-center justify-center mx-auto mb-4">
                <svg className="w-6 h-6 text-red-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-2.5L13.732 4c-.77-.833-1.964-.833-2.732 0L4.082 16.5c-.77.833.192 2.5 1.732 2.5z" /></svg>
              </div>
              <p className="text-white/80 mb-6">{message}</p>
              <div className="flex gap-3 justify-center">
                <button onClick={onClose} className="px-5 py-2.5 rounded-xl bg-white/10 hover:bg-white/15 text-sm font-medium transition">Cancelar</button>
                <button onClick={onConfirm} className="px-5 py-2.5 rounded-xl bg-red-500 hover:bg-red-600 text-sm font-medium transition">Eliminar</button>
              </div>
            </div>
          </div>
        </div>
      );
    }

    function InputField({ label, value, onChange, type = 'text', placeholder = '', required = false }) {
      return (
        <div>
          <label className="block text-sm font-medium text-white/70 mb-1.5">{label}</label>
          <input type={type} value={value} onChange={e => onChange(e.target.value)} placeholder={placeholder} required={required}
            className="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-2.5 text-white placeholder-white/30 focus:outline-none focus:border-vascan-gold/50 focus:ring-1 focus:ring-vascan-gold/30 transition text-sm" />
        </div>
      );
    }

    function SelectField({ label, value, onChange, options }) {
      return (
        <div>
          <label className="block text-sm font-medium text-white/70 mb-1.5">{label}</label>
          <select value={value} onChange={e => onChange(e.target.value)}
            className="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-2.5 text-white focus:outline-none focus:border-vascan-gold/50 transition text-sm">
            {options.map(o => <option key={o.value} value={o.value}>{o.label}</option>)}
          </select>
        </div>
      );
    }

    function LoadingSpinner() {
      return <div className="flex justify-center py-12"><div className="w-8 h-8 border-2 border-vascan-gold/30 border-t-vascan-gold rounded-full animate-spin"></div></div>;
    }

    function Toast({ message, type = 'success', onClose }) {
      useEffect(() => { const t = setTimeout(onClose, 3000); return () => clearTimeout(t); }, []);
      const bg = type === 'success' ? 'bg-green-500/15 border-green-500/30 text-green-400' : 'bg-red-500/15 border-red-500/30 text-red-400';
      return (
        <div className={`fixed top-4 right-4 z-[60] px-5 py-3 rounded-xl border text-sm font-medium fade-in ${bg}`}>
          {message}
        </div>
      );
    }

    // ── Login Screen ──
    function LoginScreen({ onLogin }) {
      const [rut, setRut] = useState('');
      const [password, setPassword] = useState('');
      const [error, setError] = useState('');
      const [loading, setLoading] = useState(false);

      async function handleSubmit(e) {
        e.preventDefault();
        setError('');
        setLoading(true);
        try {
          const data = await apiFetch('/api/auth/login', { method: 'POST', body: JSON.stringify({ rut, password }) });
          if (data.user.role !== 'admin') { setError('Acceso restringido a administradores'); return; }
          onLogin(data.user);
        } catch (err) {
          setError('RUT o contraseña incorrectos');
        } finally {
          setLoading(false);
        }
      }

      return (
        <div className="min-h-screen flex items-center justify-center p-4">
          <div className="w-full max-w-md">
            <div className="text-center mb-8">
              <div className="w-16 h-16 bg-vascan-gold/20 rounded-2xl flex items-center justify-center mx-auto mb-4">
                <svg className="w-8 h-8 text-vascan-gold" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 6V4m0 2a2 2 0 100 4m0-4a2 2 0 110 4m-6 8a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4m6 6v10m6-2a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4" />
                </svg>
              </div>
              <h1 className="text-2xl font-bold text-white">Panel de Administración</h1>
              <p className="text-white/50 mt-1">Vascan SPA — Sistema de Comensales</p>
            </div>
            <form onSubmit={handleSubmit} className="bg-vascan-surface rounded-2xl p-6 space-y-5 border border-white/10">
              {error && <div className="bg-red-500/15 border border-red-500/30 rounded-xl px-4 py-3 text-red-400 text-sm">{error}</div>}
              <InputField label="RUT" value={rut} onChange={setRut} placeholder="11111111-1" required />
              <InputField label="Contraseña" value={password} onChange={setPassword} type="password" placeholder="••••••" required />
              <button type="submit" disabled={loading} className="w-full bg-vascan-gold hover:bg-vascan-goldDark text-white font-semibold py-3 rounded-xl transition disabled:opacity-50">
                {loading ? 'Ingresando...' : 'Iniciar Sesión'}
              </button>
            </form>
          </div>
        </div>
      );
    }

    // ── Sidebar ──
    function Sidebar({ active, onNav, onLogout, user }) {
      const items = [
        { id: 'dashboard', label: 'Dashboard', icon: 'M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6' },
        { id: 'usuarios', label: 'Usuarios', icon: 'M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z' },
        { id: 'casinos', label: 'Casinos', icon: 'M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4' },
        { id: 'minutas', label: 'Minutas', icon: 'M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01' },
        { id: 'consolidacion', label: 'Consolidación', icon: 'M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z' },
        { id: 'carga', label: 'Carga Masiva', icon: 'M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12' },
      ];

      return (
        <div className="w-64 bg-vascan-surface border-r border-white/10 flex flex-col min-h-screen">
          <div className="p-5 border-b border-white/10">
            <h2 className="font-bold text-lg text-vascan-gold">Vascan Admin</h2>
            <p className="text-xs text-white/40 mt-0.5">{user?.nombre} {user?.apellido}</p>
          </div>
          <nav className="flex-1 p-3 space-y-1">
            {items.map(item => (
              <button key={item.id} onClick={() => onNav(item.id)}
                className={`w-full text-left px-4 py-2.5 rounded-xl text-sm font-medium transition flex items-center gap-3 ${active === item.id ? 'bg-vascan-gold/15 text-vascan-gold' : 'text-white/60 hover:bg-white/5 hover:text-white/80'}`}>
                <svg className="w-5 h-5 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={1.5} d={item.icon} /></svg>
                {item.label}
              </button>
            ))}
          </nav>
          <div className="p-3 border-t border-white/10">
            <button onClick={onLogout} className="w-full text-left px-4 py-2.5 rounded-xl text-sm text-red-400 hover:bg-red-500/10 transition flex items-center gap-3">
              <svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={1.5} d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" /></svg>
              Cerrar sesión
            </button>
          </div>
        </div>
      );
    }

    // ── Dashboard ──
    function DashboardView() {
      const [stats, setStats] = useState(null);
      const [loading, setLoading] = useState(true);

      useEffect(() => {
        Promise.all([apiFetch('/api/casinos'), apiFetch('/api/usuarios'), apiFetch('/api/minutas')])
          .then(([c, u, m]) => setStats({ casinos: c.length, usuarios: u.length, minutas: m.length }))
          .catch(console.error)
          .finally(() => setLoading(false));
      }, []);

      if (loading) return <LoadingSpinner />;

      return (
        <div className="fade-in">
          <h1 className="text-2xl font-bold mb-6">Dashboard</h1>
          <div className="grid grid-cols-1 md:grid-cols-4 gap-4">
            <StatCard title="Usuarios" value={stats?.usuarios || 0} icon="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z" />
            <StatCard title="Casinos" value={stats?.casinos || 0} icon="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4" />
            <StatCard title="Minutas" value={stats?.minutas || 0} icon="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2" />
            <StatCard title="Sistema" value="Operativo" icon="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
          </div>
        </div>
      );
    }

    function StatCard({ title, value, icon }) {
      return (
        <div className="bg-vascan-surface rounded-2xl border border-white/10 p-5">
          <div className="flex items-center gap-3 mb-2">
            <div className="w-10 h-10 rounded-xl bg-vascan-gold/15 flex items-center justify-center">
              <svg className="w-5 h-5 text-vascan-gold" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={1.5} d={icon} /></svg>
            </div>
          </div>
          <p className="text-2xl font-bold">{value}</p>
          <p className="text-white/50 text-sm mt-0.5">{title}</p>
        </div>
      );
    }

    // ── Usuarios CRUD ──
    function UsuariosView() {
      const [users, setUsers] = useState([]);
      const [casinos, setCasinos] = useState([]);
      const [loading, setLoading] = useState(true);
      const [showModal, setShowModal] = useState(false);
      const [editUser, setEditUser] = useState(null);
      const [deleteTarget, setDeleteTarget] = useState(null);
      const [toast, setToast] = useState(null);
      const [search, setSearch] = useState('');

      const [form, setForm] = useState({ rut: '', nombre: '', apellido: '', role: 'comensal', casinoId: '', password: '' });

      useEffect(() => { loadData(); }, []);

      async function loadData() {
        setLoading(true);
        try {
          const [u, c] = await Promise.all([apiFetch('/api/usuarios'), apiFetch('/api/casinos')]);
          setUsers(u);
          setCasinos(c);
        } catch (e) { console.error(e); }
        setLoading(false);
      }

      function openCreate() {
        setEditUser(null);
        setForm({ rut: '', nombre: '', apellido: '', role: 'comensal', casinoId: '', password: '' });
        setShowModal(true);
      }

      function openEdit(u) {
        setEditUser(u);
        setForm({ rut: u.rut, nombre: u.nombre, apellido: u.apellido, role: u.role, casinoId: u.casinoId || '', password: '' });
        setShowModal(true);
      }

      async function handleSave(e) {
        e.preventDefault();
        try {
          if (editUser) {
            const body = { nombre: form.nombre, apellido: form.apellido, role: form.role, casinoId: form.casinoId || null };
            if (form.password) body.password = form.password;
            await apiFetch(`/api/usuarios/${editUser.id}`, { method: 'PUT', body: JSON.stringify(body) });
            setToast({ message: 'Usuario actualizado', type: 'success' });
          } else {
            await apiFetch('/api/usuarios', { method: 'POST', body: JSON.stringify(form) });
            setToast({ message: 'Usuario creado', type: 'success' });
          }
          setShowModal(false);
          loadData();
        } catch (err) {
          setToast({ message: err.message, type: 'error' });
        }
      }

      async function handleDelete() {
        try {
          await apiFetch(`/api/usuarios/${deleteTarget.id}`, { method: 'DELETE' });
          setToast({ message: 'Usuario eliminado', type: 'success' });
          setDeleteTarget(null);
          loadData();
        } catch (err) {
          setToast({ message: err.message, type: 'error' });
        }
      }

      async function toggleActive(u) {
        try {
          await apiFetch(`/api/usuarios/${u.id}`, { method: 'PUT', body: JSON.stringify({ activo: !u.activo }) });
          loadData();
        } catch (err) {
          setToast({ message: err.message, type: 'error' });
        }
      }

      const filtered = users.filter(u =>
        u.nombre.toLowerCase().includes(search.toLowerCase()) ||
        u.apellido.toLowerCase().includes(search.toLowerCase()) ||
        u.rut.toLowerCase().includes(search.toLowerCase())
      );

      const roleLabels = { admin: 'Admin', comensal: 'Comensal', interlocutor: 'Interlocutor' };
      const roleBadge = { admin: 'bg-purple-500/20 text-purple-400', comensal: 'bg-blue-500/20 text-blue-400', interlocutor: 'bg-vascan-gold/20 text-vascan-gold' };

      if (loading) return <LoadingSpinner />;

      return (
        <div className="fade-in">
          {toast && <Toast message={toast.message} type={toast.type} onClose={() => setToast(null)} />}

          <div className="flex items-center justify-between mb-6">
            <h1 className="text-2xl font-bold">Usuarios</h1>
            <button onClick={openCreate} className="bg-vascan-gold hover:bg-vascan-goldDark text-white font-semibold px-5 py-2.5 rounded-xl transition text-sm flex items-center gap-2">
              <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 4v16m8-8H4" /></svg>
              Nuevo Usuario
            </button>
          </div>

          <div className="bg-vascan-surface rounded-2xl border border-white/10 overflow-hidden">
            <div className="p-4 border-b border-white/10">
              <input type="text" value={search} onChange={e => setSearch(e.target.value)} placeholder="Buscar por nombre, apellido o RUT..."
                className="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-2.5 text-white placeholder-white/30 focus:outline-none focus:border-vascan-gold/50 transition text-sm" />
            </div>
            <div className="overflow-x-auto">
              <table className="w-full text-sm">
                <thead>
                  <tr className="border-b border-white/10 text-white/50">
                    <th className="text-left px-5 py-3">RUT</th>
                    <th className="text-left px-5 py-3">Nombre</th>
                    <th className="text-left px-5 py-3">Rol</th>
                    <th className="text-left px-5 py-3">Casino</th>
                    <th className="text-center px-5 py-3">Estado</th>
                    <th className="text-right px-5 py-3">Acciones</th>
                  </tr>
                </thead>
                <tbody>
                  {filtered.map(u => {
                    const casino = casinos.find(c => c.id === u.casinoId);
                    return (
                      <tr key={u.id} className="border-b border-white/5 hover:bg-white/[0.02]">
                        <td className="px-5 py-3 font-mono text-white/70">{u.rut}</td>
                        <td className="px-5 py-3">{u.nombre} {u.apellido}</td>
                        <td className="px-5 py-3">
                          <span className={`px-2.5 py-1 rounded-full text-xs font-medium ${roleBadge[u.role]}`}>{roleLabels[u.role]}</span>
                        </td>
                        <td className="px-5 py-3 text-white/50">{casino?.nombre || '—'}</td>
                        <td className="px-5 py-3 text-center">
                          <button onClick={() => toggleActive(u)} className={`w-10 h-5 rounded-full transition relative ${u.activo ? 'bg-green-500' : 'bg-white/20'}`}>
                            <span className={`absolute top-0.5 w-4 h-4 rounded-full bg-white transition-all ${u.activo ? 'left-5' : 'left-0.5'}`}></span>
                          </button>
                        </td>
                        <td className="px-5 py-3 text-right">
                          <div className="flex items-center justify-end gap-2">
                            <button onClick={() => openEdit(u)} className="p-1.5 rounded-lg hover:bg-white/10 text-white/50 hover:text-white transition" title="Editar">
                              <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" /></svg>
                            </button>
                            <button onClick={() => setDeleteTarget(u)} className="p-1.5 rounded-lg hover:bg-red-500/10 text-white/50 hover:text-red-400 transition" title="Eliminar">
                              <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>
                            </button>
                          </div>
                        </td>
                      </tr>
                    );
                  })}
                  {filtered.length === 0 && (
                    <tr><td colSpan={6} className="px-5 py-8 text-center text-white/40">No se encontraron usuarios</td></tr>
                  )}
                </tbody>
              </table>
            </div>
            <div className="px-5 py-3 border-t border-white/10 text-sm text-white/40">
              {filtered.length} de {users.length} usuarios
            </div>
          </div>

          <Modal open={showModal} onClose={() => setShowModal(false)} title={editUser ? 'Editar Usuario' : 'Nuevo Usuario'}>
            <form onSubmit={handleSave} className="space-y-4">
              {!editUser && <InputField label="RUT" value={form.rut} onChange={v => setForm({...form, rut: v})} placeholder="12345678-9" required />}
              {editUser && <div><label className="block text-sm font-medium text-white/70 mb-1.5">RUT</label><p className="text-white/50 font-mono">{form.rut}</p></div>}
              <div className="grid grid-cols-2 gap-4">
                <InputField label="Nombre" value={form.nombre} onChange={v => setForm({...form, nombre: v})} required />
                <InputField label="Apellido" value={form.apellido} onChange={v => setForm({...form, apellido: v})} required />
              </div>
              <SelectField label="Rol" value={form.role} onChange={v => setForm({...form, role: v})}

              <InputField label="Fecha" value={form.fecha} onChange={v => setForm({...form, fecha: v})} type="date" required />

        setUploading(true);
        setError('');

          formData.append('file', file);
          const res = await fetch(`${API_BASE}${endpoint}`, { method: 'POST', credentials: 'include', body: formData });

          if (!res.ok) throw new Error(data.message || 'Error al subir archivo');
          setResult(data);
          setFile(null);

                className="flex items-center gap-4 p-4 bg-white/[0.03] border border-white/10 rounded-xl hover:border-vascan-gold/30 hover:bg-vascan-gold/5 transition text-left group">
                <div className="w-12 h-12 rounded-xl bg-green-500/15 flex items-center justify-center flex-shrink-0">
                  <svg className="w-6 h-6 text-green-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={1.5} d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2" /></svg>
                </div>
                <div>
                  <p className="font-semibold text-sm group-hover:text-vascan-gold transition">Plantilla de Minutas</p>
                  <p className="text-white/40 text-xs mt-0.5">Planificación semanal por casino con consolidación</p>
                </div>
                <svg className="w-5 h-5 text-white/20 ml-auto group-hover:text-vascan-gold transition" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" /></svg>
              </button>
            </div>
          </div>

          <div className="bg-vascan-surface rounded-2xl border border-white/10 overflow-hidden">
            <div className="flex border-b border-white/10">
              <button onClick={() => { setTab('usuarios'); setFile(null); setResult(null); setError(''); }}
                className={`flex-1 px-5 py-3 text-sm font-medium transition ${tab === 'usuarios' ? 'text-vascan-gold border-b-2 border-vascan-gold bg-vascan-gold/5' : 'text-white/50 hover:text-white/70'}`}>
                Cargar Usuarios
              </button>
              <button onClick={() => { setTab('minutas'); setFile(null); setResult(null); setError(''); }}
                className={`flex-1 px-5 py-3 text-sm font-medium transition ${tab === 'minutas' ? 'text-vascan-gold border-b-2 border-vascan-gold bg-vascan-gold/5' : 'text-white/50 hover:text-white/70'}`}>
                Cargar Minutas
              </button>
            </div>

            <div className="p-6">
              {tab === 'usuarios' && (
                <div className="mb-4">
                  <h3 className="font-semibold text-sm mb-2">Formato requerido</h3>
                  <div className="overflow-x-auto">
                    <table className="text-xs border border-white/10 rounded-lg overflow-hidden w-full">
                      <thead><tr className="bg-white/5 text-white/60"><th className="px-3 py-2 text-left">RUT</th><th className="px-3 py-2 text-left">Nombre</th><th className="px-3 py-2 text-left">Apellido</th><th className="px-3 py-2 text-left">Rol</th><th className="px-3 py-2 text-left">Casino_ID</th></tr></thead>
                      <tbody><tr className="text-white/30"><td className="px-3 py-1.5">12345678-9</td><td className="px-3 py-1.5">Juan</td><td className="px-3 py-1.5">Pérez</td><td className="px-3 py-1.5">comensal</td><td className="px-3 py-1.5">(UUID)</td></tr></tbody>
                    </table>
                  </div>
                  <p className="text-white/30 text-xs mt-2">Contraseña por defecto: primeros 4 dígitos del RUT</p>
                </div>
              )}

              {tab === 'minutas' && (
                <div className="mb-4">
                  <h3 className="font-semibold text-sm mb-2">Formato requerido</h3>
                  <p className="text-white/50 text-xs">Use la plantilla de minutas descargada arriba. Complete las opciones por día y vuelva a subir el archivo.</p>
                </div>
              )}

              {error && <div className="bg-red-500/15 border border-red-500/30 rounded-xl px-4 py-3 text-red-400 text-sm mb-4">{error}</div>}
              {result && (
                <div className="bg-green-500/10 border border-green-500/30 rounded-xl px-4 py-4 mb-4 fade-in">
                  <p className="text-green-400 font-semibold">Carga completada</p>
                  <p className="text-green-400/70 text-sm mt-1">{result.created} creados, {result.skipped} omitidos, {result.errors} errores</p>
                  {result.errorDetails?.length > 0 && (
                    <div className="mt-2 text-xs text-red-400/70 max-h-32 overflow-y-auto">
                      {result.errorDetails.map((e, i) => <div key={i}>{e.sheet ? `Hoja ${e.sheet}, ` : ''}Fila {e.row}: {e.error}</div>)}
                    </div>
                  )}
                </div>
              )}
              <div className="flex flex-col sm:flex-row items-start sm:items-center gap-4">
                <label className="flex-1 w-full">
                  <div className="border-2 border-dashed border-white/20 rounded-xl p-6 text-center cursor-pointer hover:border-vascan-gold/40 transition">
                    <svg className="w-10 h-10 mx-auto text-white/30 mb-2" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={1.5} d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12" /></svg>
                    <p className="text-sm text-white/50">{file ? file.name : 'Seleccionar archivo Excel (.xlsx)'}</p>
                    <input type="file" accept=".xlsx,.xls" onChange={e => setFile(e.target.files[0])} className="hidden" />
                  </div>
                </label>
                <button onClick={() => handleUpload(tab === 'usuarios' ? '/api/usuarios/upload' : '/api/minutas/upload')} disabled={!file || uploading}
                  className="bg-vascan-gold hover:bg-vascan-goldDark text-white font-semibold px-6 py-3 rounded-xl transition disabled:opacity-50 whitespace-nowrap text-sm">
                  {uploading ? 'Procesando...' : `Cargar ${tab === 'usuarios' ? 'Usuarios' : 'Minutas'}`}
                </button>
              </div>
            </div>
          </div>
        </div>
      );
    }

    // ── App Root ──
    function App() {
      const [user, setUser] = useState(null);
      const [view, setView] = useState('dashboard');
      const [checking, setChecking] = useState(true);

      useEffect(() => {
        apiFetch('/api/auth/me')
          .then(data => { if (data.user.role === 'admin') setUser(data.user); })
          .catch(() => {})
          .finally(() => setChecking(false));
      }, []);

      function handleLogout() {
        apiFetch('/api/auth/logout', { method: 'POST' }).catch(() => {});
        setUser(null);
        setView('dashboard');
      }

      if (checking) return <LoadingSpinner />;
      if (!user) return <LoginScreen onLogin={u => setUser(u)} />;

      const views = {
        dashboard: DashboardView,
        usuarios: UsuariosView,
        casinos: CasinosView,
        minutas: MinutasView,
        consolidacion: ConsolidacionView,
        carga: CargaMasivaView,
      };

      const CurrentView = views[view] || DashboardView;

      return (
        <div className="flex min-h-screen">
          <Sidebar active={view} onNav={setView} onLogout={handleLogout} user={user} />
          <main className="flex-1 p-8 overflow-y-auto">
            <CurrentView key={view} />
          </main>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
