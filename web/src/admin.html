                          onChange={() => setForm({...form, casinoIds: toggleCasinoInList(form.casinoIds, c.id)})}
                          className="w-4 h-4 rounded accent-amber-500" />
                        <span className="text-sm text-white/80">{c.nombre}</span>
                      </label>
                    ))}
                  </div>
                </div>
              )}
              <InputField label="Opción 1" value={form.opcion1} onChange={v => setForm({...form, opcion1: v})} placeholder="Ej: Pollo al horno con arroz" required />
              <InputField label="Opción 2" value={form.opcion2} onChange={v => setForm({...form, opcion2: v})} placeholder="Ej: Pescado frito con puré" required />
              <InputField label="Opción 3" value={form.opcion3} onChange={v => setForm({...form, opcion3: v})} placeholder="Ej: Pasta boloñesa" required />
              <InputField label="Opción 4 (opcional)" value={form.opcion4} onChange={v => setForm({...form, opcion4: v})} placeholder="Ej: Ensalada César" />
              <InputField label="Opción 5 (opcional)" value={form.opcion5} onChange={v => setForm({...form, opcion5: v})} placeholder="Ej: Menú vegetariano" />
              <div className="flex justify-end gap-3 pt-2">
                <button type="button" onClick={() => setShowModal(false)} className="px-5 py-2.5 rounded-xl bg-white/10 hover:bg-white/15 text-sm font-medium transition">Cancelar</button>
                <button type="submit" className="px-5 py-2.5 rounded-xl bg-vascan-gold hover:bg-vascan-goldDark text-sm font-medium transition">
                  {editItem ? 'Guardar Cambios' : 'Crear Minuta'}
                </button>
              </div>
            </form>
          </Modal>

          <Modal open={showCloneModal} onClose={() => setShowCloneModal(false)} title="Clonar Minuta">
            <form onSubmit={handleClone} className="space-y-4">
              {cloneSource && (
                <div className="bg-white/5 rounded-xl p-3 border border-white/10 text-sm">
                  <p className="text-white/60 mb-1">Clonando minuta de: <span className="text-white font-medium">{cloneSource.fecha}</span></p>
                  <p className="text-white/60">Familia: <span className={`inline-block text-xs font-medium px-2 py-0.5 rounded-full border ${getFamiliaColor(cloneSource.familia || 'Almuerzo', familiasList)}`}>{getFamiliaLabel(cloneSource.familia || 'Almuerzo', familiasList)}</span></p>
                </div>
              )}
              <InputField label="Nueva fecha (dejar vacío para mantener)" value={cloneForm.fecha} onChange={v => setCloneForm({...cloneForm, fecha: v})} type="date" />
              <div>
                <label className="block text-sm font-medium text-white/60 mb-1.5">Casinos destino</label>
                <div className="space-y-2 max-h-36 overflow-y-auto bg-white/5 rounded-xl p-3 border border-white/10">
                  {casinos.map(c => (
                    <label key={c.id} className="flex items-center gap-3 cursor-pointer hover:bg-white/5 rounded-lg px-2 py-1.5 transition">
                      <input type="checkbox" checked={cloneForm.casinoIds.includes(c.id)}
                        onChange={() => setCloneForm({...cloneForm, casinoIds: toggleCasinoInList(cloneForm.casinoIds, c.id)})}
                        className="w-4 h-4 rounded accent-amber-500" />
                      <span className="text-sm text-white/80">{c.nombre}</span>
                    </label>
                  ))}
                </div>
              </div>
              <div className="flex justify-end gap-3 pt-2">
                <button type="button" onClick={() => setShowCloneModal(false)} className="px-5 py-2.5 rounded-xl bg-white/10 hover:bg-white/15 text-sm font-medium transition">Cancelar</button>
                <button type="submit" className="px-5 py-2.5 rounded-xl bg-green-600 hover:bg-green-700 text-sm font-medium transition">
                  Clonar Minuta
                </button>
              </div>
            </form>
          </Modal>

          <ConfirmDialog open={!!deleteTarget} onClose={() => setDeleteTarget(null)} onConfirm={handleDelete}
            message={`¿Desactivar la minuta del ${deleteTarget?.fecha}?`} />
        </div>
      );
    }

    // ── Consolidación ──
    function ConsolidacionView() {
      const [casinos, setCasinos] = useState([]);
      const [selectedCasino, setSelectedCasino] = useState('');
      const [selectedDate, setSelectedDate] = useState(new Date().toISOString().split('T')[0]);
      const [report, setReport] = useState(null);
      const [loading, setLoading] = useState(false);
      const [loadingCasinos, setLoadingCasinos] = useState(true);

      useEffect(() => {
        apiFetch('/api/casinos').then(data => {
          setCasinos(data);
          if (data.length > 0) setSelectedCasino(data[0].id);
          setLoadingCasinos(false);
        }).catch(() => setLoadingCasinos(false));
      }, []);

      async function handleSearch() {
        if (!selectedCasino || !selectedDate) return;
        setLoading(true);
        setReport(null);
        try {
          const data = await apiFetch(`/api/reportes/consolidacion?casinoId=${selectedCasino}&fecha=${selectedDate}`);
          setReport(data);
        } catch (err) { console.error(err); }
        setLoading(false);
      }

      if (loadingCasinos) return <LoadingSpinner />;

      return (
        <div className="fade-in">
          <h1 className="text-2xl font-bold mb-6">Consolidación / Programación</h1>
          <div className="bg-vascan-surface rounded-2xl border border-white/10 p-6 mb-6">
            <div className="grid grid-cols-1 md:grid-cols-3 gap-4 items-end">
              <SelectField label="Casino" value={selectedCasino} onChange={setSelectedCasino}
                options={casinos.map(c => ({ value: c.id, label: c.nombre }))} />
              <InputField label="Fecha" value={selectedDate} onChange={setSelectedDate} type="date" />
              <button onClick={handleSearch} disabled={loading}
                className="bg-vascan-gold hover:bg-vascan-goldDark text-white font-semibold py-2.5 rounded-xl transition disabled:opacity-50 text-sm">
                {loading ? 'Consultando...' : 'Consultar'}
              </button>
            </div>
          </div>

          {report && (
            <div className="bg-vascan-surface rounded-2xl border border-white/10 overflow-hidden fade-in">
              <div className="p-5 border-b border-white/10">
                <h2 className="font-semibold text-lg">Resumen de Producción</h2>
                <p className="text-white/50 text-sm mt-0.5">{report.casinoNombre} — {report.fecha}</p>
              </div>
              {!report.minuta ? (
                <div className="p-8 text-center text-white/40">No hay minuta registrada para esta fecha</div>
              ) : (
                <div>
                  <table className="w-full">
                    <thead>
                      <tr className="border-b border-white/10 text-white/50 text-sm">
                        <th className="text-left px-5 py-3">Opción</th>
                        <th className="text-left px-5 py-3">Descripción</th>
                        <th className="text-right px-5 py-3">Pedidos</th>
                        <th className="text-right px-5 py-3">%</th>
                      </tr>
                    </thead>
                    <tbody>
                      {report.opciones.map((op, i) => (
                        <tr key={i} className="border-b border-white/5 hover:bg-white/[0.02]">
                          <td className="px-5 py-4">
                            <span className="inline-flex items-center justify-center w-8 h-8 rounded-full bg-vascan-gold/20 text-vascan-gold font-bold text-sm">{op.numero}</span>
                          </td>
                          <td className="px-5 py-4 text-white/80">{op.descripcion}</td>
                          <td className="px-5 py-4 text-right font-semibold text-lg">{op.cantidad}</td>
                          <td className="px-5 py-4 text-right text-white/50">{op.porcentaje}%</td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                  <div className="px-5 py-4 bg-white/[0.02] space-y-2">
                    <div className="flex justify-between items-center">
                      <span className="font-semibold text-white/70">Total comensales inscritos</span>
                      <span className="font-bold text-xl text-vascan-gold">{report.totalPedidos}</span>
                    </div>
                    {report.totalNoAsiste > 0 && (
                      <div className="flex justify-between items-center">
                        <span className="text-orange-400/80 text-sm">No asisten</span>
                        <span className="font-semibold text-orange-400">{report.totalNoAsiste}</span>
                      </div>
                    )}
                    {report.totalVisitas > 0 && (
                      <div className="flex justify-between items-center">
                        <span className="text-blue-400/80 text-sm">Vales de visita</span>
                        <span className="font-semibold text-blue-400">{report.totalVisitas}</span>
                      </div>
                    )}
                  </div>
                  {report.visitas && report.visitas.length > 0 && (
                    <div className="px-5 py-4 border-t border-white/10">
                      <h3 className="text-sm font-semibold text-white/60 mb-2">Visitas del día</h3>
                      <div className="space-y-1">
                        {report.visitas.map((v, i) => (
                          <div key={i} className="flex justify-between text-sm">
                            <span className="text-white/80">{v.nombreVisita}</span>
                            <span className="text-white/40 font-mono text-xs">{v.codigoQr}</span>
                          </div>
                        ))}
                      </div>
                    </div>
                  )}
                </div>
              )}
            </div>
          )}
        </div>
      );
    }

    // ── Familias CRUD ──
    function FamiliasView() {
      const [famList, setFamList] = useState([]);
      const [loading, setLoading] = useState(true);
      const [showModal, setShowModal] = useState(false);
      const [editing, setEditing] = useState(null);
      const [form, setForm] = useState({ nombre: '', color: '#D4A843' });
      const [toast, setToast] = useState(null);

      useEffect(() => {
        apiFetch('/api/familias').then(data => { setFamList(data); setLoading(false); });
      }, []);
      useEffect(() => { if (toast) { const t = setTimeout(() => setToast(null), 3000); return () => clearTimeout(t); } }, [toast]);

      function refresh() { apiFetch('/api/familias').then(data => setFamList(data)); }

      function openCreate() { setEditing(null); setForm({ nombre: '', color: '#D4A843' }); setShowModal(true); }
      function openEdit(f) { setEditing(f); setForm({ nombre: f.nombre, color: f.color }); setShowModal(true); }

      async function handleSave() {
        if (!form.nombre) { setToast({ message: 'El nombre es obligatorio', type: 'error' }); return; }
        try {
          if (editing) {
            await apiFetch(`/api/familias/${editing.id}`, { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(form) });
            setToast({ message: 'Familia actualizada', type: 'success' });
          } else {
            await apiFetch('/api/familias', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(form) });
            setToast({ message: 'Familia creada', type: 'success' });
          }
          setShowModal(false); refresh();
        } catch (e) {
          setToast({ message: e.message || 'Error al guardar', type: 'error' });
        }
      }

      async function toggleActivo(f) {
        try {
          await apiFetch(`/api/familias/${f.id}`, { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ activo: !f.activo }) });
          setToast({ message: f.activo ? 'Familia desactivada' : 'Familia activada', type: 'success' }); refresh();
        } catch (e) { setToast({ message: 'Error', type: 'error' }); }
      }

      if (loading) return <LoadingSpinner />;

      return (
        <div>
          {toast && <Toast message={toast.message} type={toast.type} onClose={() => setToast(null)} />}
          <div className="flex justify-between items-center mb-6">
            <div>
              <h1 className="text-2xl font-bold text-white">Familias de Minutas</h1>
              <p className="text-white/50 text-sm mt-1">Categorías personalizadas para las minutas (Ej: Almuerzo, VIP, Ejecutivo)</p>
            </div>
            <button onClick={openCreate} className="bg-vascan-gold text-vascan-dark px-5 py-2.5 rounded-xl text-sm font-semibold hover:bg-vascan-gold/90 transition flex items-center gap-2">
              <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 4v16m8-8H4"/></svg>
              Nueva Familia
            </button>
          </div>

          <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
            {famList.map(f => (
              <div key={f.id} className={`bg-vascan-surface border rounded-xl p-5 ${f.activo ? 'border-white/10' : 'border-red-500/20 opacity-60'}`}>
                <div className="flex justify-between items-center">
                  <div className="flex items-center gap-3">
                    <div className="w-8 h-8 rounded-full" style={{ backgroundColor: f.color }}></div>
                    <div>
                      <h3 className="font-semibold text-white">{f.nombre}</h3>
                      <p className="text-xs text-white/40">{f.activo ? 'Activa' : 'Inactiva'}</p>
                    </div>
                  </div>
                  <div className="flex gap-2">
                    <button onClick={() => toggleActivo(f)} className={`p-2 rounded-lg transition ${f.activo ? 'text-green-400 hover:bg-green-500/10' : 'text-red-400 hover:bg-red-500/10'}`}>
                      <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d={f.activo ? 'M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z' : 'M10 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2m7-2a9 9 0 11-18 0 9 9 0 0118 0z'}/></svg>
                    </button>
                    <button onClick={() => openEdit(f)} className="p-2 text-white/40 hover:text-white hover:bg-white/5 rounded-lg transition">
                      <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/></svg>
                    </button>
                  </div>
                </div>
              </div>
            ))}
          </div>

          {showModal && (
            <div className="fixed inset-0 bg-black/60 flex items-center justify-center z-50 p-4">
              <div className="bg-vascan-surface border border-white/10 rounded-2xl w-full max-w-md p-6">
                <h2 className="text-xl font-bold text-white mb-5">{editing ? 'Editar Familia' : 'Nueva Familia'}</h2>
                <div className="space-y-4">
                  <InputField label="Nombre" value={form.nombre} onChange={v => setForm({...form, nombre: v})} placeholder="Ej: VIP, Almuerzo Ejecutivo" required />
                  <div>
                    <label className="block text-sm font-medium text-white/70 mb-1.5">Color</label>
                    <div className="flex items-center gap-3">
                      <input type="color" value={form.color} onChange={e => setForm({...form, color: e.target.value})} className="w-12 h-10 rounded-lg border border-white/10 cursor-pointer" />
                      <span className="text-white/50 text-sm">{form.color}</span>
                    </div>
                  </div>
                </div>
                <div className="flex gap-3 mt-6">
                  <button onClick={() => setShowModal(false)} className="flex-1 px-5 py-2.5 rounded-xl text-sm font-medium text-white/60 hover:text-white border border-white/10 hover:bg-white/5 transition">Cancelar</button>
                  <button onClick={handleSave} className="flex-1 bg-vascan-gold text-vascan-dark px-5 py-2.5 rounded-xl text-sm font-semibold hover:bg-vascan-gold/90 transition">{editing ? 'Guardar' : 'Crear'}</button>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    // ── Periodos (Horarios de inscripción) ──
    function PeriodosView() {
      const [periodos, setPeriodos] = useState([]);
      const [casinos, setCasinos] = useState([]);
      const [selectedCasino, setSelectedCasino] = useState('');
      const [loading, setLoading] = useState(true);
      const [showModal, setShowModal] = useState(false);
      const [editing, setEditing] = useState(null);
      const [form, setForm] = useState({ nombre: '', casinoId: '', fechaInicio: '', fechaFin: '' });
      const [toast, setToast] = useState(null);

      useEffect(() => {
        Promise.all([
          apiFetch('/api/periodos'),
          apiFetch('/api/casinos/all')
        ]).then(([p, c]) => {
          setPeriodos(p);
          setCasinos(c);
          if (c.length > 0) setSelectedCasino(c[0].id);
        }).finally(() => setLoading(false));
      }, []);

      useEffect(() => { if (toast) { const t = setTimeout(() => setToast(null), 3000); return () => clearTimeout(t); } }, [toast]);

      function refresh() {
        apiFetch('/api/periodos').then(p => setPeriodos(p));
      }

      function openCreate() {
        setEditing(null);
        setForm({ nombre: '', casinoId: selectedCasino, fechaInicio: '', fechaFin: '' });
        setShowModal(true);
      }

      function openEdit(p) {
        setEditing(p);
        const fi = new Date(p.fechaInicio);
        const ff = new Date(p.fechaFin);
        const toLocal = d => {
          const pad = n => String(n).padStart(2, '0');
          return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`;
        };
        setForm({ nombre: p.nombre, casinoId: p.casinoId, fechaInicio: toLocal(fi), fechaFin: toLocal(ff) });
        setShowModal(true);
      }

      async function handleSave() {
        if (!form.nombre || !form.casinoId || !form.fechaInicio || !form.fechaFin) {
          setToast({ message: 'Todos los campos son obligatorios', type: 'error' }); return;
        }
        try {
          if (editing) {
            await apiFetch(`/api/periodos/${editing.id}`, { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ nombre: form.nombre, fechaInicio: form.fechaInicio, fechaFin: form.fechaFin }) });
            setToast({ message: 'Periodo actualizado', type: 'success' });
          } else {
            await apiFetch('/api/periodos', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(form) });
            setToast({ message: 'Periodo creado', type: 'success' });
          }
          setShowModal(false); refresh();
        } catch (e) {
          setToast({ message: e.message || 'Error al guardar', type: 'error' });
        }
      }

      async function toggleActivo(p) {
        try {
          await apiFetch(`/api/periodos/${p.id}`, { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ activo: !p.activo }) });
          setToast({ message: p.activo ? 'Periodo desactivado' : 'Periodo activado', type: 'success' }); refresh();
        } catch (e) {
          setToast({ message: 'Error al cambiar estado', type: 'error' });
        }
      }

      async function handleDelete(p) {
        if (!confirm('¿Desactivar este periodo?')) return;
        try {
          await apiFetch(`/api/periodos/${p.id}`, { method: 'DELETE' });
          setToast({ message: 'Periodo desactivado', type: 'success' }); refresh();
        } catch (e) {
          setToast({ message: 'Error al eliminar', type: 'error' });
        }
      }

      const filtered = selectedCasino ? periodos.filter(p => p.casinoId === selectedCasino) : periodos;
      const getCasinoName = id => casinos.find(c => c.id === id)?.nombre || 'N/A';
      const isActive = p => {
        if (!p.activo) return false;
        const now = new Date();
        return new Date(p.fechaInicio) <= now && new Date(p.fechaFin) >= now;
      };

      if (loading) return <LoadingSpinner />;

      return (
        <div>
          {toast && <Toast message={toast.message} type={toast.type} onClose={() => setToast(null)} />}
          <div className="flex justify-between items-center mb-6">
            <div>
              <h1 className="text-2xl font-bold text-white">Periodos de Inscripción</h1>
              <p className="text-white/50 text-sm mt-1">Horarios en que los comensales pueden inscribirse a las minutas</p>
            </div>
            <button onClick={openCreate} className="bg-vascan-gold text-vascan-dark px-5 py-2.5 rounded-xl text-sm font-semibold hover:bg-vascan-gold/90 transition flex items-center gap-2">
              <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 4v16m8-8H4"/></svg>
              Nuevo Periodo
            </button>
          </div>

          {casinos.length > 0 && (
            <div className="mb-4">
              <select value={selectedCasino} onChange={e => setSelectedCasino(e.target.value)}
                className="bg-vascan-dark border border-white/10 text-white rounded-xl px-4 py-2.5 text-sm appearance-none cursor-pointer" style={{colorScheme: 'dark'}}>
                <option value="">Todos los casinos</option>
                {casinos.map(c => <option key={c.id} value={c.id}>{c.nombre}</option>)}
              </select>
            </div>
          )}

          {filtered.length === 0 ? (
            <div className="text-center py-16 text-white/40">
              <svg className="w-16 h-16 mx-auto mb-4 opacity-30" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={1.5} d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
              <p className="text-lg font-medium">Sin periodos configurados</p>
              <p className="text-sm mt-1">Crea un periodo para definir cuándo los comensales pueden inscribirse</p>
            </div>
          ) : (
            <div className="grid gap-4">
              {filtered.map(p => {
                const active = isActive(p);
                const fi = new Date(p.fechaInicio);
                const ff = new Date(p.fechaFin);
                const fmt = d => d.toLocaleString('es-CL', { day: '2-digit', month: '2-digit', year: 'numeric', hour: '2-digit', minute: '2-digit' });
                return (
                  <div key={p.id} className={`bg-vascan-surface border rounded-xl p-5 ${active ? 'border-green-500/40' : p.activo ? 'border-white/10' : 'border-red-500/20 opacity-60'}`}>
                    <div className="flex justify-between items-start">
                      <div className="flex-1">
                        <div className="flex items-center gap-3 mb-2">
                          <h3 className="font-semibold text-white text-lg">{p.nombre}</h3>
                          {active && <span className="px-2 py-0.5 bg-green-500/20 text-green-400 text-xs font-medium rounded-full animate-pulse">EN CURSO</span>}
                          {!p.activo && <span className="px-2 py-0.5 bg-red-500/20 text-red-400 text-xs font-medium rounded-full">INACTIVO</span>}
                          {p.activo && !active && new Date(p.fechaFin) < new Date() && <span className="px-2 py-0.5 bg-gray-500/20 text-gray-400 text-xs font-medium rounded-full">FINALIZADO</span>}
                          {p.activo && !active && new Date(p.fechaInicio) > new Date() && <span className="px-2 py-0.5 bg-blue-500/20 text-blue-400 text-xs font-medium rounded-full">PROGRAMADO</span>}
                        </div>
                        <p className="text-white/50 text-sm">{getCasinoName(p.casinoId)}</p>
                        <div className="flex gap-6 mt-3 text-sm">
                          <div>
                            <span className="text-white/40">Inicio: </span>
                            <span className="text-white/80">{fmt(fi)}</span>
                          </div>
                          <div>
                            <span className="text-white/40">Fin: </span>
                            <span className="text-white/80">{fmt(ff)}</span>
                          </div>
                        </div>
                      </div>
                      <div className="flex gap-2">
                        <button onClick={() => toggleActivo(p)} className={`p-2 rounded-lg transition ${p.activo ? 'text-green-400 hover:bg-green-500/10' : 'text-red-400 hover:bg-red-500/10'}`} title={p.activo ? 'Desactivar' : 'Activar'}>
                          <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d={p.activo ? 'M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z' : 'M10 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2m7-2a9 9 0 11-18 0 9 9 0 0118 0z'}/></svg>
                        </button>
                        <button onClick={() => openEdit(p)} className="p-2 text-white/40 hover:text-white hover:bg-white/5 rounded-lg transition">
                          <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/></svg>
                        </button>
                        <button onClick={() => handleDelete(p)} className="p-2 text-white/40 hover:text-red-400 hover:bg-red-500/5 rounded-lg transition">
                          <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
                        </button>
                      </div>
                    </div>
                  </div>
                );
              })}
            </div>
          )}

          {showModal && (
            <div className="fixed inset-0 bg-black/60 flex items-center justify-center z-50 p-4">
              <div className="bg-vascan-surface border border-white/10 rounded-2xl w-full max-w-lg p-6">
                <h2 className="text-xl font-bold text-white mb-5">{editing ? 'Editar Periodo' : 'Nuevo Periodo'}</h2>
                <div className="space-y-4">
                  <div>
                    <label className="block text-sm font-medium text-white/60 mb-1">Nombre</label>
                    <input value={form.nombre} onChange={e => setForm({...form, nombre: e.target.value})} placeholder="Ej: Inscripción Almuerzo Lunes"
                      className="w-full bg-vascan-dark border border-white/10 rounded-xl px-4 py-2.5 text-white text-sm" />
                  </div>
                  {!editing && (
                    <div>
                      <label className="block text-sm font-medium text-white/60 mb-1">Casino</label>
                      <select value={form.casinoId} onChange={e => setForm({...form, casinoId: e.target.value})}
                        className="w-full bg-vascan-dark border border-white/10 rounded-xl px-4 py-2.5 text-white text-sm" style={{colorScheme: 'dark'}}>
                        {casinos.map(c => <option key={c.id} value={c.id}>{c.nombre}</option>)}
                      </select>
                    </div>
                  )}
                  <div>
                    <label className="block text-sm font-medium text-white/60 mb-1">Fecha y hora de inicio</label>
                    <input type="datetime-local" value={form.fechaInicio} onChange={e => setForm({...form, fechaInicio: e.target.value})}
                      className="w-full bg-vascan-dark border border-white/10 rounded-xl px-4 py-2.5 text-white text-sm" />
                  </div>
                  <div>
                    <label className="block text-sm font-medium text-white/60 mb-1">Fecha y hora de fin</label>
                    <input type="datetime-local" value={form.fechaFin} onChange={e => setForm({...form, fechaFin: e.target.value})}
                      className="w-full bg-vascan-dark border border-white/10 rounded-xl px-4 py-2.5 text-white text-sm" />
                  </div>
                </div>
                <div className="flex gap-3 mt-6">
                  <button onClick={() => setShowModal(false)} className="flex-1 px-5 py-2.5 rounded-xl text-sm font-medium text-white/60 hover:text-white border border-white/10 hover:bg-white/5 transition">Cancelar</button>
                  <button onClick={handleSave} className="flex-1 bg-vascan-gold text-vascan-dark px-5 py-2.5 rounded-xl text-sm font-semibold hover:bg-vascan-gold/90 transition">{editing ? 'Guardar Cambios' : 'Crear Periodo'}</button>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    // ── Carga Masiva ──
    function CargaMasivaView() {
      const [tab, setTab] = useState('usuarios');
      const [file, setFile] = useState(null);
      const [uploading, setUploading] = useState(false);
      const [result, setResult] = useState(null);
      const [error, setError] = useState('');

      async function handleUpload(endpoint) {
        if (!file) return;
        setUploading(true);
        setError('');
        setResult(null);
        try {
          const formData = new FormData();
          formData.append('file', file);
          const res = await fetch(`${API_BASE}${endpoint}`, { method: 'POST', credentials: 'include', body: formData });
          const data = await res.json();
          if (!res.ok) throw new Error(data.message || 'Error al subir archivo');
          setResult(data);
          setFile(null);
        } catch (err) {
          setError(err.message);
        } finally {
          setUploading(false);
        }
      }

      function downloadTemplate(type) {
        window.open(`${API_BASE}/api/plantillas/${type}`, '_blank');
      }

      return (
        <div className="fade-in">
          <h1 className="text-2xl font-bold mb-6">Carga y Plantillas</h1>

          <div className="bg-vascan-surface rounded-2xl border border-white/10 p-6 mb-6">
            <h2 className="font-semibold mb-4 flex items-center gap-2">
              <svg className="w-5 h-5 text-vascan-gold" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={1.5} d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" /></svg>
              Descargar Plantillas
            </h2>
            <p className="text-white/50 text-sm mb-4">Descargue las plantillas Excel profesionales para completar y luego cargar al sistema.</p>
            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
              <button onClick={() => downloadTemplate('usuarios')}
                className="flex items-center gap-4 p-4 bg-white/[0.03] border border-white/10 rounded-xl hover:border-vascan-gold/30 hover:bg-vascan-gold/5 transition text-left group">
                <div className="w-12 h-12 rounded-xl bg-blue-500/15 flex items-center justify-center flex-shrink-0">
                  <svg className="w-6 h-6 text-blue-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={1.5} d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z" /></svg>
                </div>
                <div>
                  <p className="font-semibold text-sm group-hover:text-vascan-gold transition">Plantilla de Usuarios</p>
                  <p className="text-white/40 text-xs mt-0.5">RUT, Nombre, Apellido, Rol, Casino</p>
                </div>
                <svg className="w-5 h-5 text-white/20 ml-auto group-hover:text-vascan-gold transition" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" /></svg>
              </button>
              <button onClick={() => downloadTemplate('minutas')}
                className="flex items-center gap-4 p-4 bg-white/[0.03] border border-white/10 rounded-xl hover:border-vascan-gold/30 hover:bg-vascan-gold/5 transition text-left group">
                <div className="w-12 h-12 rounded-xl bg-green-500/15 flex items-center justify-center flex-shrink-0">
                  <svg className="w-6 h-6 text-green-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={1.5} d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2" /></svg>
                </div>
                <div>
                  <p className="font-semibold text-sm group-hover:text-vascan-gold transition">Plantilla de Minutas</p>
                  <p className="text-white/40 text-xs mt-0.5">Planificación semanal por casino con consolidación</p>
                </div>
                <svg className="w-5 h-5 text-white/20 ml-auto group-hover:text-vascan-gold transition" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" /></svg>
              </button>
            </div>
          </div>

          <div className="bg-vascan-surface rounded-2xl border border-white/10 overflow-hidden">
            <div className="flex border-b border-white/10">
              <button onClick={() => { setTab('usuarios'); setFile(null); setResult(null); setError(''); }}
                className={`flex-1 px-5 py-3 text-sm font-medium transition ${tab === 'usuarios' ? 'text-vascan-gold border-b-2 border-vascan-gold bg-vascan-gold/5' : 'text-white/50 hover:text-white/70'}`}>
                Cargar Usuarios
              </button>
              <button onClick={() => { setTab('minutas'); setFile(null); setResult(null); setError(''); }}
                className={`flex-1 px-5 py-3 text-sm font-medium transition ${tab === 'minutas' ? 'text-vascan-gold border-b-2 border-vascan-gold bg-vascan-gold/5' : 'text-white/50 hover:text-white/70'}`}>
                Cargar Minutas
              </button>
            </div>

            <div className="p-6">
              {tab === 'usuarios' && (
                <div className="mb-4">
                  <h3 className="font-semibold text-sm mb-2">Formato requerido</h3>
                  <div className="overflow-x-auto">
                    <table className="text-xs border border-white/10 rounded-lg overflow-hidden w-full">
                      <thead><tr className="bg-white/5 text-white/60"><th className="px-3 py-2 text-left">RUT</th><th className="px-3 py-2 text-left">Nombre</th><th className="px-3 py-2 text-left">Apellido</th><th className="px-3 py-2 text-left">Rol</th><th className="px-3 py-2 text-left">Casino</th></tr></thead>
                      <tbody><tr className="text-white/30"><td className="px-3 py-1.5">12345678-9</td><td className="px-3 py-1.5">Juan</td><td className="px-3 py-1.5">Pérez</td><td className="px-3 py-1.5">comensal</td><td className="px-3 py-1.5">(Seleccionar del desplegable)</td></tr></tbody>
                    </table>
                  </div>
                  <p className="text-white/30 text-xs mt-2">Contraseña por defecto: primeros 4 dígitos del RUT</p>
                </div>
              )}

              {tab === 'minutas' && (
                <div className="mb-4">
                  <h3 className="font-semibold text-sm mb-2">Formato requerido</h3>
                  <p className="text-white/50 text-xs">Use la plantilla de minutas descargada arriba. Complete las opciones por día y vuelva a subir el archivo.</p>
                </div>
              )}

              {error && <div className="bg-red-500/15 border border-red-500/30 rounded-xl px-4 py-3 text-red-400 text-sm mb-4">{error}</div>}
              {result && (
                <div className="bg-green-500/10 border border-green-500/30 rounded-xl px-4 py-4 mb-4 fade-in">
                  <p className="text-green-400 font-semibold">Carga completada</p>
                  <p className="text-green-400/70 text-sm mt-1">{result.created} creados, {result.skipped} omitidos, {result.errors} errores</p>
                  {result.errorDetails?.length > 0 && (
                    <div className="mt-2 text-xs text-red-400/70 max-h-32 overflow-y-auto">
                      {result.errorDetails.map((e, i) => <div key={i}>{e.sheet ? `Hoja ${e.sheet}, ` : ''}Fila {e.row}: {e.error}</div>)}
                    </div>
                  )}
                </div>
              )}
              <div className="flex flex-col sm:flex-row items-start sm:items-center gap-4">
                <label className="flex-1 w-full">
                  <div className="border-2 border-dashed border-white/20 rounded-xl p-6 text-center cursor-pointer hover:border-vascan-gold/40 transition">
                    <svg className="w-10 h-10 mx-auto text-white/30 mb-2" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={1.5} d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12" /></svg>
                    <p className="text-sm text-white/50">{file ? file.name : 'Seleccionar archivo Excel (.xlsx)'}</p>
                    <input type="file" accept=".xlsx,.xls" onChange={e => setFile(e.target.files[0])} className="hidden" />
                  </div>
                </label>
                <button onClick={() => handleUpload(tab === 'usuarios' ? '/api/usuarios/upload' : '/api/minutas/upload')} disabled={!file || uploading}
                  className="bg-vascan-gold hover:bg-vascan-goldDark text-white font-semibold px-6 py-3 rounded-xl transition disabled:opacity-50 whitespace-nowrap text-sm">
                  {uploading ? 'Procesando...' : `Cargar ${tab === 'usuarios' ? 'Usuarios' : 'Minutas'}`}
                </button>
              </div>
            </div>
          </div>
        </div>
      );
    }

    // ── App Root ──
    function App() {
      const [user, setUser] = useState(null);
      const [view, setView] = useState('dashboard');
      const [checking, setChecking] = useState(true);

      useEffect(() => {
        apiFetch('/api/auth/me')
          .then(data => { if (data.user.role === 'admin') setUser(data.user); })
          .catch(() => {})
          .finally(() => setChecking(false));
      }, []);

      function handleLogout() {
        apiFetch('/api/auth/logout', { method: 'POST' }).catch(() => {});
        setUser(null);
        setView('dashboard');
      }

      if (checking) return <LoadingSpinner />;
      if (!user) return <LoginScreen onLogin={u => setUser(u)} />;

      const views = {
        dashboard: DashboardView,
        usuarios: UsuariosView,
        casinos: CasinosView,
        minutas: MinutasView,
        consolidacion: ConsolidacionView,
        familias: FamiliasView,
        periodos: PeriodosView,
        carga: CargaMasivaView,
      };

      const CurrentView = views[view] || DashboardView;

      return (
        <div className="flex min-h-screen">
          <Sidebar active={view} onNav={setView} onLogout={handleLogout} user={user} />
          <main className="flex-1 p-8 overflow-y-auto">
            <CurrentView key={view} />
          </main>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
