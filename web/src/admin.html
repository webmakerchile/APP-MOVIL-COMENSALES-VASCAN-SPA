<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Panel Admin — Vascan Comensales</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            vascan: {
              bg: '#1A1A2E',
              surface: '#16213E',
              card: '#0F3460',
              gold: '#D4A843',
              goldLight: '#E8C96A',
              goldDark: '#B8902E',
            }
          },
          fontFamily: {
            sans: ['Inter', 'system-ui', 'sans-serif']
          }
        }
      }
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', system-ui, sans-serif; }
    .fade-in { animation: fadeIn 0.3s ease-in; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body class="bg-vascan-bg min-h-screen text-white">
  <div id="root"></div>
  <script type="text/babel" data-type="module">
    const { useState, useEffect, useCallback } = React;

    const API_BASE = window.location.origin;

    async function apiFetch(path, options = {}) {
      const res = await fetch(`${API_BASE}${path}`, {
        credentials: 'include',
        headers: { 'Content-Type': 'application/json', ...options.headers },
        ...options,
      });
      if (!res.ok) {
        const text = await res.text();
        throw new Error(text || res.statusText);
      }
      return res.json();
    }

    // ── Login Screen ──
    function LoginScreen({ onLogin }) {
      const [rut, setRut] = useState('');
      const [password, setPassword] = useState('');
      const [error, setError] = useState('');
      const [loading, setLoading] = useState(false);

      async function handleSubmit(e) {
        e.preventDefault();
        setError('');
        setLoading(true);
        try {
          const data = await apiFetch('/api/auth/login', {
            method: 'POST',
            body: JSON.stringify({ rut, password }),
          });
          if (data.user.role !== 'admin') {
            setError('Acceso restringido a administradores');
            return;
          }
          onLogin(data.user);
        } catch (err) {
          setError('RUT o contraseña incorrectos');
        } finally {
          setLoading(false);
        }
      }

      return (
        <div className="min-h-screen flex items-center justify-center p-4">
          <div className="w-full max-w-md">
            <div className="text-center mb-8">
              <div className="w-16 h-16 bg-vascan-gold/20 rounded-2xl flex items-center justify-center mx-auto mb-4">
                <svg className="w-8 h-8 text-vascan-gold" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 6V4m0 2a2 2 0 100 4m0-4a2 2 0 110 4m-6 8a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4m6 6v10m6-2a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4" />
                </svg>
              </div>
              <h1 className="text-2xl font-bold text-white">Panel de Administración</h1>
              <p className="text-white/50 mt-1">Vascan SPA — Sistema de Comensales</p>
            </div>
            <form onSubmit={handleSubmit} className="bg-vascan-surface rounded-2xl p-6 space-y-5 border border-white/10">
              {error && (
                <div className="bg-red-500/15 border border-red-500/30 rounded-xl px-4 py-3 text-red-400 text-sm">
                  {error}
                </div>
              )}
              <div>
                <label className="block text-sm font-medium text-white/70 mb-1.5">RUT</label>
                <input
                  type="text"
                  value={rut}
                  onChange={e => setRut(e.target.value)}
                  placeholder="11111111-1"
                  className="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white placeholder-white/30 focus:outline-none focus:border-vascan-gold/50 focus:ring-1 focus:ring-vascan-gold/30 transition"
                  required
                />
              </div>
              <div>
                <label className="block text-sm font-medium text-white/70 mb-1.5">Contraseña</label>
                <input
                  type="password"
                  value={password}
                  onChange={e => setPassword(e.target.value)}
                  placeholder="••••••"
                  className="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white placeholder-white/30 focus:outline-none focus:border-vascan-gold/50 focus:ring-1 focus:ring-vascan-gold/30 transition"
                  required
                />
              </div>
              <button
                type="submit"
                disabled={loading}
                className="w-full bg-vascan-gold hover:bg-vascan-goldDark text-white font-semibold py-3 rounded-xl transition disabled:opacity-50"
              >
                {loading ? 'Ingresando...' : 'Iniciar Sesión'}
              </button>
            </form>
          </div>
        </div>
      );
    }

    // ── Sidebar ──
    function Sidebar({ active, onNav, onLogout, user }) {
      const items = [
        { id: 'dashboard', label: 'Dashboard', icon: '📊' },
        { id: 'consolidacion', label: 'Consolidación', icon: '📋' },
        { id: 'usuarios', label: 'Carga Masiva', icon: '📁' },
        { id: 'minutas', label: 'Minutas', icon: '🍽️' },
      ];
      return (
        <div className="w-64 bg-vascan-surface border-r border-white/10 flex flex-col min-h-screen">
          <div className="p-5 border-b border-white/10">
            <h2 className="font-bold text-lg text-vascan-gold">Vascan Admin</h2>
            <p className="text-xs text-white/40 mt-0.5">{user?.nombre} {user?.apellido}</p>
          </div>
          <nav className="flex-1 p-3 space-y-1">
            {items.map(item => (
              <button
                key={item.id}
                onClick={() => onNav(item.id)}
                className={`w-full text-left px-4 py-2.5 rounded-xl text-sm font-medium transition flex items-center gap-3 ${
                  active === item.id
                    ? 'bg-vascan-gold/15 text-vascan-gold'
                    : 'text-white/60 hover:bg-white/5 hover:text-white/80'
                }`}
              >
                <span>{item.icon}</span>
                {item.label}
              </button>
            ))}
          </nav>
          <div className="p-3 border-t border-white/10">
            <button
              onClick={onLogout}
              className="w-full text-left px-4 py-2.5 rounded-xl text-sm text-red-400 hover:bg-red-500/10 transition"
            >
              Cerrar sesión
            </button>
          </div>
        </div>
      );
    }

    // ── Dashboard ──
    function DashboardView() {
      const [stats, setStats] = useState(null);
      const [loading, setLoading] = useState(true);

      useEffect(() => {
        async function load() {
          try {
            const casinos = await apiFetch('/api/casinos');
            setStats({ casinos: casinos.length });
          } catch (e) {
            console.error(e);
          } finally {
            setLoading(false);
          }
        }
        load();
      }, []);

      if (loading) return <LoadingSpinner />;

      return (
        <div className="fade-in">
          <h1 className="text-2xl font-bold mb-6">Dashboard</h1>
          <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
            <StatCard title="Casinos Activos" value={stats?.casinos || 0} color="gold" />
            <StatCard title="Sistema" value="Operativo" color="green" />
            <StatCard title="Versión" value="1.0.0" color="blue" />
          </div>
          <div className="mt-8 bg-vascan-surface rounded-2xl border border-white/10 p-6">
            <h2 className="font-semibold text-lg mb-3">Accesos rápidos</h2>
            <p className="text-white/50 text-sm">
              Usa el menú lateral para navegar entre Consolidación, Carga Masiva y gestión de Minutas.
            </p>
          </div>
        </div>
      );
    }

    function StatCard({ title, value, color }) {
      const colors = {
        gold: 'border-vascan-gold/30 bg-vascan-gold/5',
        green: 'border-green-500/30 bg-green-500/5',
        blue: 'border-blue-500/30 bg-blue-500/5',
      };
      return (
        <div className={`rounded-2xl border p-5 ${colors[color]}`}>
          <p className="text-white/50 text-sm">{title}</p>
          <p className="text-2xl font-bold mt-1">{value}</p>
        </div>
      );
    }

    // ── Consolidación ──
    function ConsolidacionView() {
      const [casinos, setCasinos] = useState([]);
      const [selectedCasino, setSelectedCasino] = useState('');
      const [selectedDate, setSelectedDate] = useState(new Date().toISOString().split('T')[0]);
      const [report, setReport] = useState(null);
      const [loading, setLoading] = useState(false);
      const [loadingCasinos, setLoadingCasinos] = useState(true);

      useEffect(() => {
        apiFetch('/api/casinos').then(data => {
          setCasinos(data);
          if (data.length > 0) setSelectedCasino(data[0].id);
          setLoadingCasinos(false);
        }).catch(() => setLoadingCasinos(false));
      }, []);

      async function handleSearch() {
        if (!selectedCasino || !selectedDate) return;
        setLoading(true);
        setReport(null);
        try {
          const data = await apiFetch(`/api/reportes/consolidacion?casinoId=${selectedCasino}&fecha=${selectedDate}`);
          setReport(data);
        } catch (err) {
          console.error(err);
        } finally {
          setLoading(false);
        }
      }

      if (loadingCasinos) return <LoadingSpinner />;

      return (
        <div className="fade-in">
          <h1 className="text-2xl font-bold mb-6">Consolidación / Programación</h1>
          <div className="bg-vascan-surface rounded-2xl border border-white/10 p-6 mb-6">
            <div className="grid grid-cols-1 md:grid-cols-3 gap-4 items-end">
              <div>
                <label className="block text-sm font-medium text-white/70 mb-1.5">Casino</label>
                <select
                  value={selectedCasino}
                  onChange={e => setSelectedCasino(e.target.value)}
                  className="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-vascan-gold/50 transition"
                >
                  {casinos.map(c => (
                    <option key={c.id} value={c.id} className="bg-vascan-bg">{c.nombre}</option>
                  ))}
                </select>
              </div>
              <div>
                <label className="block text-sm font-medium text-white/70 mb-1.5">Fecha</label>
                <input
                  type="date"
                  value={selectedDate}
                  onChange={e => setSelectedDate(e.target.value)}
                  className="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-vascan-gold/50 transition"
                />
              </div>
              <button
                onClick={handleSearch}
                disabled={loading}
                className="bg-vascan-gold hover:bg-vascan-goldDark text-white font-semibold py-3 rounded-xl transition disabled:opacity-50"
              >
                {loading ? 'Consultando...' : 'Consultar'}
              </button>
            </div>
          </div>

          {report && (
            <div className="bg-vascan-surface rounded-2xl border border-white/10 overflow-hidden fade-in">
              <div className="p-5 border-b border-white/10">
                <h2 className="font-semibold text-lg">Resumen de Producción</h2>
                <p className="text-white/50 text-sm mt-0.5">
                  {report.casinoNombre} — {report.fecha}
                </p>
              </div>

              {!report.minuta ? (
                <div className="p-8 text-center text-white/40">
                  No hay minuta registrada para esta fecha
                </div>
              ) : (
                <div>
                  <table className="w-full">
                    <thead>
                      <tr className="border-b border-white/10 text-white/50 text-sm">
                        <th className="text-left px-5 py-3">Opción</th>
                        <th className="text-left px-5 py-3">Descripción</th>
                        <th className="text-right px-5 py-3">Pedidos</th>
                        <th className="text-right px-5 py-3">%</th>
                      </tr>
                    </thead>
                    <tbody>
                      {report.opciones.map((op, i) => (
                        <tr key={i} className="border-b border-white/5 hover:bg-white/3">
                          <td className="px-5 py-4">
                            <span className="inline-flex items-center justify-center w-8 h-8 rounded-full bg-vascan-gold/20 text-vascan-gold font-bold text-sm">
                              {op.numero}
                            </span>
                          </td>
                          <td className="px-5 py-4 text-white/80">{op.descripcion}</td>
                          <td className="px-5 py-4 text-right font-semibold text-lg">{op.cantidad}</td>
                          <td className="px-5 py-4 text-right text-white/50">{op.porcentaje}%</td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                  <div className="px-5 py-4 bg-white/3 flex justify-between items-center">
                    <span className="font-semibold text-white/70">Total de pedidos</span>
                    <span className="font-bold text-xl text-vascan-gold">{report.totalPedidos}</span>
                  </div>
                </div>
              )}
            </div>
          )}
        </div>
      );
    }

    // ── Carga Masiva ──
    function CargaMasivaView() {
      const [file, setFile] = useState(null);
      const [uploading, setUploading] = useState(false);
      const [result, setResult] = useState(null);
      const [error, setError] = useState('');

      async function handleUpload() {
        if (!file) return;
        setUploading(true);
        setError('');
        setResult(null);
        try {
          const formData = new FormData();
          formData.append('file', file);
          const res = await fetch(`${API_BASE}/api/usuarios/upload`, {
            method: 'POST',
            credentials: 'include',
            body: formData,
          });
          const data = await res.json();
          if (!res.ok) throw new Error(data.message || 'Error al subir archivo');
          setResult(data);
          setFile(null);
        } catch (err) {
          setError(err.message);
        } finally {
          setUploading(false);
        }
      }

      return (
        <div className="fade-in">
          <h1 className="text-2xl font-bold mb-6">Carga Masiva de Usuarios</h1>

          <div className="bg-vascan-surface rounded-2xl border border-white/10 p-6 mb-6">
            <h2 className="font-semibold mb-3">Formato del archivo Excel</h2>
            <p className="text-white/50 text-sm mb-4">
              El archivo debe tener las siguientes columnas en la primera fila:
            </p>
            <div className="overflow-x-auto">
              <table className="text-sm border border-white/10 rounded-xl overflow-hidden">
                <thead>
                  <tr className="bg-white/5 text-white/60">
                    <th className="px-4 py-2 text-left">RUT</th>
                    <th className="px-4 py-2 text-left">Nombre</th>
                    <th className="px-4 py-2 text-left">Apellido</th>
                    <th className="px-4 py-2 text-left">Rol</th>
                    <th className="px-4 py-2 text-left">Casino_ID</th>
                  </tr>
                </thead>
                <tbody>
                  <tr className="text-white/40">
                    <td className="px-4 py-2">12345678-9</td>
                    <td className="px-4 py-2">Juan</td>
                    <td className="px-4 py-2">Pérez</td>
                    <td className="px-4 py-2">comensal</td>
                    <td className="px-4 py-2">(UUID del casino)</td>
                  </tr>
                </tbody>
              </table>
            </div>
            <p className="text-white/40 text-xs mt-3">
              La contraseña por defecto serán los primeros 4 dígitos del RUT.
              Roles válidos: <code className="text-vascan-gold">comensal</code>, <code className="text-vascan-gold">interlocutor</code>
            </p>
          </div>

          <div className="bg-vascan-surface rounded-2xl border border-white/10 p-6">
            {error && (
              <div className="bg-red-500/15 border border-red-500/30 rounded-xl px-4 py-3 text-red-400 text-sm mb-4">
                {error}
              </div>
            )}

            {result && (
              <div className="bg-green-500/10 border border-green-500/30 rounded-xl px-4 py-4 mb-4 fade-in">
                <p className="text-green-400 font-semibold">Carga completada</p>
                <p className="text-green-400/70 text-sm mt-1">
                  {result.created} usuarios creados, {result.skipped} omitidos (ya existían), {result.errors} errores
                </p>
                {result.errorDetails && result.errorDetails.length > 0 && (
                  <div className="mt-2 text-xs text-red-400/70 max-h-32 overflow-y-auto">
                    {result.errorDetails.map((e, i) => <div key={i}>Fila {e.row}: {e.error}</div>)}
                  </div>
                )}
              </div>
            )}

            <div className="flex flex-col sm:flex-row items-start sm:items-center gap-4">
              <label className="flex-1">
                <div className="border-2 border-dashed border-white/20 rounded-xl p-6 text-center cursor-pointer hover:border-vascan-gold/40 transition">
                  <svg className="w-10 h-10 mx-auto text-white/30 mb-2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={1.5} d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12" />
                  </svg>
                  <p className="text-sm text-white/50">
                    {file ? file.name : 'Seleccionar archivo Excel (.xlsx)'}
                  </p>
                  <input
                    type="file"
                    accept=".xlsx,.xls"
                    onChange={e => setFile(e.target.files[0])}
                    className="hidden"
                  />
                </div>
              </label>
              <button
                onClick={handleUpload}
                disabled={!file || uploading}
                className="bg-vascan-gold hover:bg-vascan-goldDark text-white font-semibold px-6 py-3 rounded-xl transition disabled:opacity-50 whitespace-nowrap"
              >
                {uploading ? 'Subiendo...' : 'Subir Archivo'}
              </button>
            </div>
          </div>
        </div>
      );
    }

    // ── Minutas View ──
    function MinutasView() {
      const [casinos, setCasinos] = useState([]);
      const [selectedCasino, setSelectedCasino] = useState('');
      const [minutas, setMinutas] = useState([]);
      const [loading, setLoading] = useState(true);

      useEffect(() => {
        apiFetch('/api/casinos').then(data => {
          setCasinos(data);
          if (data.length > 0) {
            setSelectedCasino(data[0].id);
            loadMinutas(data[0].id);
          } else {
            setLoading(false);
          }
        });
      }, []);

      async function loadMinutas(casinoId) {
        setLoading(true);
        try {
          const data = await apiFetch(`/api/minutas/${casinoId}`);
          setMinutas(data.sort((a, b) => a.fecha.localeCompare(b.fecha)));
        } catch (e) {
          console.error(e);
        } finally {
          setLoading(false);
        }
      }

      function handleCasinoChange(id) {
        setSelectedCasino(id);
        loadMinutas(id);
      }

      const DAYS = ['Dom', 'Lun', 'Mar', 'Mié', 'Jue', 'Vie', 'Sáb'];

      return (
        <div className="fade-in">
          <h1 className="text-2xl font-bold mb-6">Gestión de Minutas</h1>

          <div className="bg-vascan-surface rounded-2xl border border-white/10 p-4 mb-6">
            <select
              value={selectedCasino}
              onChange={e => handleCasinoChange(e.target.value)}
              className="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-vascan-gold/50 transition"
            >
              {casinos.map(c => (
                <option key={c.id} value={c.id} className="bg-vascan-bg">{c.nombre}</option>
              ))}
            </select>
          </div>

          {loading ? <LoadingSpinner /> : (
            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
              {minutas.map(m => {
                const d = new Date(m.fecha + 'T12:00:00');
                return (
                  <div key={m.id} className="bg-vascan-surface rounded-2xl border border-white/10 p-5">
                    <div className="flex items-center justify-between mb-3">
                      <div>
                        <p className="text-vascan-gold font-semibold">{DAYS[d.getDay()]} {d.getDate()}</p>
                        <p className="text-white/40 text-xs">{m.fecha}</p>
                      </div>
                    </div>
                    <div className="space-y-2 text-sm">
                      <div className="flex gap-2"><span className="text-vascan-gold font-semibold min-w-[20px]">1.</span><span className="text-white/70">{m.opcion1}</span></div>
                      <div className="flex gap-2"><span className="text-vascan-gold font-semibold min-w-[20px]">2.</span><span className="text-white/70">{m.opcion2}</span></div>
                      <div className="flex gap-2"><span className="text-vascan-gold font-semibold min-w-[20px]">3.</span><span className="text-white/70">{m.opcion3}</span></div>
                      {m.opcion4 && <div className="flex gap-2"><span className="text-vascan-gold font-semibold min-w-[20px]">4.</span><span className="text-white/70">{m.opcion4}</span></div>}
                    </div>
                  </div>
                );
              })}
              {minutas.length === 0 && (
                <div className="col-span-full text-center py-12 text-white/30">
                  No hay minutas registradas para este casino
                </div>
              )}
            </div>
          )}
        </div>
      );
    }

    // ── Loading Spinner ──
    function LoadingSpinner() {
      return (
        <div className="flex items-center justify-center py-12">
          <div className="w-8 h-8 border-2 border-vascan-gold/30 border-t-vascan-gold rounded-full animate-spin"></div>
        </div>
      );
    }

    // ── App ──
    function App() {
      const [user, setUser] = useState(null);
      const [activeView, setActiveView] = useState('dashboard');
      const [checkingAuth, setCheckingAuth] = useState(true);

      useEffect(() => {
        apiFetch('/api/auth/me')
          .then(data => {
            if (data.user && data.user.role === 'admin') {
              setUser(data.user);
            }
          })
          .catch(() => {})
          .finally(() => setCheckingAuth(false));
      }, []);

      async function handleLogout() {
        try { await apiFetch('/api/auth/logout', { method: 'POST' }); } catch (e) {}
        setUser(null);
      }

      if (checkingAuth) {
        return (
          <div className="min-h-screen flex items-center justify-center">
            <LoadingSpinner />
          </div>
        );
      }

      if (!user) {
        return <LoginScreen onLogin={setUser} />;
      }

      const views = {
        dashboard: DashboardView,
        consolidacion: ConsolidacionView,
        usuarios: CargaMasivaView,
        minutas: MinutasView,
      };
      const ActiveComponent = views[activeView] || DashboardView;

      return (
        <div className="flex min-h-screen">
          <Sidebar active={activeView} onNav={setActiveView} onLogout={handleLogout} user={user} />
          <main className="flex-1 p-6 lg:p-8 overflow-y-auto">
            <ActiveComponent />
          </main>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
